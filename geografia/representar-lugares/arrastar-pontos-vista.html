<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classifique as Visões! — Geografia 2º Ano</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #F59E0B;
    --light: #FCD34D;
    --bg: #FFFBEB;
    --amber-100: #FEF3C7;
    --amber-200: #FDE68A;
    --amber-600: #D97706;
    --amber-700: #B45309;
    --green-100: #DCFCE7;
    --green-500: #22C55E;
    --green-700: #15803D;
    --red-100: #FEE2E2;
    --red-500: #EF4444;
    --red-700: #B91C1C;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-500: #6B7280;
    --gray-700: #374151;
    --shadow: 0 4px 16px rgba(245,158,11,0.15);
    --shadow-md: 0 8px 24px rgba(245,158,11,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--gray-700);
  }
  .header {
    background: linear-gradient(135deg, var(--primary) 0%, #FBBF24 60%, var(--light) 100%);
    padding: 28px 20px 24px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(245,158,11,0.4);
    position: relative;
  }
  .header h1 {
    font-family: 'Baloo 2', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 800;
    color: #fff;
    text-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .header p {
    font-size: clamp(1rem, 3vw, 1.2rem);
    color: rgba(255,255,255,0.92);
    margin-top: 6px;
    font-weight: 600;
  }
  .btn-back {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.5);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 8px 16px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-back:hover { background: rgba(255,255,255,0.4); }
  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px 48px; }
  .pool-section { margin-bottom: 28px; }
  .pool-label {
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--amber-700);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pool-label::after {
    content: '';
    flex: 1;
    height: 2px;
    background: var(--amber-200);
    border-radius: 2px;
  }
  .cards-pool {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    min-height: 80px;
    padding: 16px;
    background: var(--amber-100);
    border-radius: 20px;
    border: 2px dashed var(--amber-200);
    transition: border-color 0.2s, background 0.2s;
  }
  .cards-pool.drag-over {
    border-color: var(--primary);
    background: #FEF9EC;
  }
  .card {
    background: #fff;
    border: 2.5px solid var(--primary);
    border-radius: 16px;
    padding: 14px 16px;
    cursor: grab;
    width: calc(33.33% - 8px);
    min-width: 180px;
    max-width: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    box-shadow: var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    user-select: none;
    touch-action: none;
  }
  @media (max-width: 680px) {
    .card { width: calc(50% - 6px); min-width: 140px; }
  }
  @media (max-width: 420px) {
    .card { width: 100%; max-width: 100%; }
  }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.35; transform: scale(0.96); box-shadow: none; }
  .card.ghost {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.92;
    transform: rotate(-2deg) scale(1.06);
    box-shadow: var(--shadow-md);
    border-color: var(--amber-600);
    width: 220px;
  }
  .card .card-emoji { font-size: 2rem; line-height: 1; }
  .card .card-text {
    font-size: 1.15rem;
    font-weight: 600;
    text-align: center;
    color: var(--gray-700);
    line-height: 1.4;
  }
  .card.correct {
    background: var(--green-100);
    border-color: var(--green-500);
    cursor: default;
  }
  .card.correct .card-text { color: var(--green-700); }
  .card.shake { animation: shake 0.5s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    15% { transform: translateX(-10px) rotate(-2deg); }
    35% { transform: translateX(10px) rotate(2deg); }
    55% { transform: translateX(-7px) rotate(-1deg); }
    75% { transform: translateX(7px) rotate(1deg); }
    90% { transform: translateX(-3px); }
  }
  .zones-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  @media (max-width: 680px) { .zones-grid { grid-template-columns: 1fr; } }
  .drop-zone {
    background: var(--bg);
    border: 3px dashed var(--primary);
    border-radius: 20px;
    padding: 16px 12px 20px;
    min-height: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
  }
  .drop-zone.drag-over {
    border-color: var(--amber-600);
    background: var(--amber-100);
    animation: pulse-zone 0.8s ease infinite alternate;
    transform: scale(1.02);
  }
  @keyframes pulse-zone {
    from { box-shadow: 0 0 0 0 rgba(245,158,11,0.3); }
    to   { box-shadow: 0 0 0 14px rgba(245,158,11,0); }
  }
  .zone-label {
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--amber-700);
    text-align: center;
    line-height: 1.2;
  }
  .zone-desc {
    font-size: 1rem;
    font-weight: 600;
    color: var(--gray-500);
    text-align: center;
    background: var(--amber-100);
    padding: 4px 10px;
    border-radius: 20px;
  }
  .zone-separator { width: 80%; height: 2px; background: var(--amber-200); border-radius: 2px; }
  .zone-cards { display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center; }
  .zone-cards .card { width: 100%; max-width: 100%; min-width: unset; }
  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 24px;
  }
  .btn {
    font-family: 'Nunito', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    box-shadow: var(--shadow);
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--amber-600); box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-outline { background: #fff; color: var(--amber-700); border: 2.5px solid var(--primary); }
  .btn-outline:hover { background: var(--amber-100); transform: translateY(-2px); }
  .btn-green { background: var(--green-500); color: #fff; }
  .btn-green:hover { background: var(--green-700); transform: translateY(-2px); }
  .progress-bar-wrap {
    background: var(--amber-100);
    border-radius: 20px;
    height: 12px;
    margin-bottom: 24px;
    overflow: hidden;
    border: 1.5px solid var(--amber-200);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--light));
    border-radius: 20px;
    transition: width 0.4s ease;
  }
  .progress-text { text-align: center; font-size: 1.1rem; font-weight: 700; color: var(--amber-700); margin-bottom: 10px; }
  .result-screen {
    display: none;
    text-align: center;
    padding: 32px 20px;
    background: #fff;
    border-radius: 24px;
    border: 2.5px solid var(--amber-200);
    box-shadow: var(--shadow-md);
    margin-top: 16px;
  }
  .result-screen.show { display: block; }
  .result-score { font-family: 'Baloo 2', sans-serif; font-size: 4rem; font-weight: 800; color: var(--primary); line-height: 1; margin-bottom: 8px; }
  .result-label { font-size: 1.3rem; font-weight: 700; color: var(--gray-700); margin-bottom: 16px; }
  .result-msg { font-size: 1.4rem; font-weight: 700; padding: 14px 24px; border-radius: 16px; margin-bottom: 24px; display: inline-block; }
  .result-msg.perfect { background: var(--green-100); color: var(--green-700); }
  .result-msg.great   { background: var(--amber-100); color: var(--amber-700); }
  .result-msg.ok      { background: var(--red-100);   color: var(--red-700); }
  .gabarito { display: none; margin-top: 24px; background: var(--gray-100); border-radius: 20px; padding: 20px 16px; }
  .gabarito.show { display: block; }
  .gabarito h3 { font-family: 'Baloo 2', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--amber-700); margin-bottom: 16px; }
  .gabarito-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .gabarito-item {
    background: #fff;
    border: 2px solid var(--amber-200);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 1.05rem;
    font-weight: 600;
  }
  .gabarito-item .g-emoji { font-size: 1.5rem; }
  .gabarito-item .g-cat {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--amber-700);
    background: var(--amber-100);
    padding: 2px 8px;
    border-radius: 8px;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="header">
  <button class="btn-back" onclick="window.close()">&#8592; Portal</button>
  <h1>&#129513; Classifique as Visoes!</h1>
  <p>Arraste cada situacao para a visao correta</p>
</div>

<div class="main">
  <div class="progress-text" id="progressText">0 de 9 classificados</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="pool-section">
    <div class="pool-label">&#127183; Situacoes para classificar</div>
    <div class="cards-pool" id="pool" data-zone="pool"></div>
  </div>

  <div class="zones-grid">
    <div class="drop-zone" id="zone-vertical" data-zone="vertical">
      <div class="zone-label">&#128065;&#65039; Visao Vertical</div>
      <div class="zone-desc">de cima para baixo</div>
      <div class="zone-separator"></div>
      <div class="zone-cards" id="zone-vertical-cards"></div>
    </div>
    <div class="drop-zone" id="zone-frontal" data-zone="frontal">
      <div class="zone-label">&#128065;&#65039; Visao Frontal</div>
      <div class="zone-desc">de frente</div>
      <div class="zone-separator"></div>
      <div class="zone-cards" id="zone-frontal-cards"></div>
    </div>
    <div class="drop-zone" id="zone-obliqua" data-zone="obliqua">
      <div class="zone-label">&#128065;&#65039; Visao Obliqua</div>
      <div class="zone-desc">de cima e de lado</div>
      <div class="zone-separator"></div>
      <div class="zone-cards" id="zone-obliqua-cards"></div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="btnResult" disabled onclick="showResult()">Ver Resultado</button>
    <button class="btn btn-outline" onclick="showGabarito()">Ver Gabarito</button>
    <button class="btn btn-outline" onclick="resetGame()">&#128260; Tentar de Novo</button>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-score" id="resultScore">0/9</div>
    <div class="result-label">acertos!</div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="actions" style="justify-content:center;">
      <button class="btn btn-green" onclick="resetGame()">&#128260; Tentar de Novo</button>
      <button class="btn btn-outline" onclick="showGabarito()">Ver Gabarito</button>
    </div>
  </div>

  <div class="gabarito" id="gabarito">
    <h3>&#128203; Gabarito</h3>
    <div class="gabarito-grid" id="gabaritoGrid"></div>
  </div>
</div>

<script>
const CARDS_DATA = [
  { id: 'v1', emoji: '🚁', text: 'Uma câmera de drone filmando uma praça lá de cima', correct: 'vertical' },
  { id: 'v2', emoji: '🐦', text: 'Um pássaro olhando o telhado de uma casa', correct: 'vertical' },
  { id: 'v3', emoji: '🗺️', text: 'O desenho de uma planta cartográfica de sala de aula', correct: 'vertical' },
  { id: 'f1', emoji: '🚪', text: 'Você olha para a porta da sua sala bem de frente', correct: 'frontal' },
  { id: 'f2', emoji: '📸', text: 'Uma foto tirada olhando diretamente para a fachada de uma casa', correct: 'frontal' },
  { id: 'f3', emoji: '🖥️', text: 'Como você enxerga a tela do computador sentado na frente', correct: 'frontal' },
  { id: 'o1', emoji: '📦', text: 'Uma caixa onde você vê o tampo E o lado ao mesmo tempo', correct: 'obliqua' },
  { id: 'o2', emoji: '🏙️', text: 'Uma foto de um prédio tirada de cima e de lado', correct: 'obliqua' },
  { id: 'o3', emoji: '🪑', text: 'Uma cadeira fotografada de um ângulo que mostra o assento e a lateral', correct: 'obliqua' },
];

let cardStates = {};
let draggedId = null;
let ghostEl = null;
let touchOffsetX = 0, touchOffsetY = 0;
let resultShown = false;

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = type === 'correct'
      ? [{ f: 523, t: 0 }, { f: 659, t: 0.15 }, { f: 784, t: 0.30 }]
      : [{ f: 300, t: 0 }, { f: 200, t: 0.2 }];
    notes.forEach(function(n) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(n.f, ctx.currentTime + n.t);
      gain.gain.setValueAtTime(0.25, ctx.currentTime + n.t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + n.t + 0.22);
      osc.start(ctx.currentTime + n.t);
      osc.stop(ctx.currentTime + n.t + 0.25);
    });
  } catch(e) {}
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function init() {
  cardStates = {};
  CARDS_DATA.forEach(function(c) { cardStates[c.id] = { zone: 'pool', correct: null }; });

  var pool = document.getElementById('pool');
  pool.innerHTML = '';
  var shuffled = shuffle(CARDS_DATA.slice());
  shuffled.forEach(function(c) { pool.appendChild(buildCard(c)); });

  ['vertical', 'frontal', 'obliqua'].forEach(function(z) {
    document.getElementById('zone-' + z + '-cards').innerHTML = '';
  });

  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('gabarito').classList.remove('show');
  document.getElementById('btnResult').disabled = true;
  resultShown = false;
  updateProgress();
  setupZoneListeners();
}

function buildCard(data) {
  var div = document.createElement('div');
  div.className = 'card';
  div.dataset.id = data.id;
  div.innerHTML = '<span class="card-emoji">' + data.emoji + '</span><span class="card-text">' + data.text + '</span>';
  div.draggable = true;
  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragend', onDragEnd);
  div.addEventListener('touchstart', onTouchStart, { passive: false });
  div.addEventListener('touchmove', onTouchMove, { passive: false });
  div.addEventListener('touchend', onTouchEnd);
  return div;
}

function onDragStart(e) {
  var card = e.currentTarget;
  if (card.classList.contains('correct')) { e.preventDefault(); return; }
  draggedId = card.dataset.id;
  card.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  draggedId = null;
  removeAllDragOver();
}

function setupZoneListeners() {
  var allZones = [document.getElementById('pool')].concat(Array.from(document.querySelectorAll('.drop-zone')));
  allZones.forEach(function(zone) {
    zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', function() { zone.classList.remove('drag-over'); });
    zone.addEventListener('drop', onDrop);
  });
}

function removeAllDragOver() {
  document.querySelectorAll('.drag-over').forEach(function(el) { el.classList.remove('drag-over'); });
}

function onDrop(e) {
  e.preventDefault();
  removeAllDragOver();
  if (!draggedId) return;
  var zoneEl = e.currentTarget;
  var targetZone = zoneEl.dataset.zone;
  dropCard(draggedId, targetZone, zoneEl);
}

function onTouchStart(e) {
  var card = e.currentTarget;
  if (card.classList.contains('correct')) return;
  e.preventDefault();
  draggedId = card.dataset.id;
  var touch = e.touches[0];
  var rect = card.getBoundingClientRect();
  touchOffsetX = touch.clientX - rect.left;
  touchOffsetY = touch.clientY - rect.top;
  ghostEl = card.cloneNode(true);
  ghostEl.classList.add('ghost');
  ghostEl.style.left = (touch.clientX - touchOffsetX) + 'px';
  ghostEl.style.top  = (touch.clientY - touchOffsetY) + 'px';
  document.body.appendChild(ghostEl);
  card.classList.add('dragging');
}

function onTouchMove(e) {
  if (!draggedId || !ghostEl) return;
  e.preventDefault();
  var touch = e.touches[0];
  ghostEl.style.left = (touch.clientX - touchOffsetX) + 'px';
  ghostEl.style.top  = (touch.clientY - touchOffsetY) + 'px';
  ghostEl.style.display = 'none';
  var underEl = document.elementFromPoint(touch.clientX, touch.clientY);
  ghostEl.style.display = '';
  removeAllDragOver();
  var zone = underEl && (underEl.closest('.drop-zone') || underEl.closest('.cards-pool'));
  if (zone) zone.classList.add('drag-over');
}

function onTouchEnd(e) {
  if (!draggedId) return;
  var touch = e.changedTouches[0];
  if (ghostEl) { ghostEl.remove(); ghostEl = null; }
  var cardEl = document.querySelector('[data-id="' + draggedId + '"]');
  if (cardEl) cardEl.classList.remove('dragging');
  removeAllDragOver();
  var underEl = document.elementFromPoint(touch.clientX, touch.clientY);
  var zoneEl = underEl && (underEl.closest('.drop-zone') || underEl.closest('.cards-pool'));
  if (zoneEl) {
    var targetZone = zoneEl.dataset.zone;
    dropCard(draggedId, targetZone, zoneEl);
  }
  draggedId = null;
}

function dropCard(id, targetZone, zoneEl) {
  var cardData = CARDS_DATA.find(function(c) { return c.id === id; });
  if (!cardData) return;
  var cardEl = document.querySelector('[data-id="' + id + '"]');
  if (!cardEl) return;

  if (targetZone === 'pool') {
    cardStates[id] = { zone: 'pool', correct: null };
    cardEl.classList.remove('correct');
    document.getElementById('pool').appendChild(cardEl);
    updateProgress();
    return;
  }

  var isCorrect = cardData.correct === targetZone;
  if (isCorrect) {
    cardStates[id] = { zone: targetZone, correct: true };
    cardEl.classList.add('correct');
    playSound('correct');
    document.getElementById('zone-' + targetZone + '-cards').appendChild(cardEl);
    updateProgress();
  } else {
    playSound('error');
    cardEl.classList.add('shake');
    cardEl.addEventListener('animationend', function() { cardEl.classList.remove('shake'); }, { once: true });
    document.getElementById('pool').appendChild(cardEl);
  }
}

function updateProgress() {
  var done = Object.values(cardStates).filter(function(s) { return s.zone !== 'pool'; }).length;
  var pct = (done / CARDS_DATA.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' de ' + CARDS_DATA.length + ' classificados';
  var allDone = done === CARDS_DATA.length;
  document.getElementById('btnResult').disabled = !allDone;
  if (allDone && !resultShown) { setTimeout(showResult, 600); }
}

function showResult() {
  resultShown = true;
  var correct = Object.values(cardStates).filter(function(s) { return s.correct === true; }).length;
  var total = CARDS_DATA.length;
  document.getElementById('resultScore').textContent = correct + '/' + total;
  var msg, cls;
  if (correct === total) {
    msg = '🎉 Perfeito! Você dominou todos os pontos de vista!';
    cls = 'perfect';
  } else if (correct >= 6) {
    msg = '🌟 Muito bem! Você está quase lá!';
    cls = 'great';
  } else {
    msg = '💪 Continue praticando! Você vai conseguir!';
    cls = 'ok';
  }
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultMsg').className = 'result-msg ' + cls;
  var screen = document.getElementById('resultScreen');
  screen.classList.add('show');
  screen.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function showGabarito() {
  var gab = document.getElementById('gabarito');
  if (gab.classList.contains('show')) { gab.classList.remove('show'); return; }
  var labels = { vertical: '👁️ Visão Vertical', frontal: '👁️ Visão Frontal', obliqua: '👁️ Visão Oblíqua' };
  var grid = document.getElementById('gabaritoGrid');
  grid.innerHTML = '';
  CARDS_DATA.forEach(function(c) {
    var div = document.createElement('div');
    div.className = 'gabarito-item';
    div.innerHTML = '<span class="g-emoji">' + c.emoji + '</span><span style="flex:1;font-size:1rem">' + c.text + '</span><span class="g-cat">' + labels[c.correct] + '</span>';
    grid.appendChild(div);
  });
  gab.classList.add('show');
  gab.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetGame() {
  init();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

init();
</script>
</body>
