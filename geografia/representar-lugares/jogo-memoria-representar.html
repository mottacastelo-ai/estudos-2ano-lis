<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo da Memória — Representar Lugares</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #F59E0B;
      --light: #FCD34D;
      --bg: #FFFBEB;
      --green-match: #D1FAE5;
      --green-border: #34D399;
      --card-back-bg: #F59E0B;
      --card-term-bg: #FEF3C7;
      --card-def-bg: #FFFFFF;
      --radius: 16px;
      --shadow: 0 4px 16px rgba(245,158,11,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── HEADER ─── */
    header {
      width: 100%;
      background: linear-gradient(135deg, #F59E0B 0%, #FBBF24 60%, #FCD34D 100%);
      padding: 1.5rem 1rem 1.2rem;
      text-align: center;
      box-shadow: 0 4px 12px rgba(245,158,11,0.3);
    }

    header h1 {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      color: #78350F;
      line-height: 1.2;
    }

    header p {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: #92400E;
      font-weight: 600;
      margin-top: 0.3rem;
    }

    /* ─── COUNTER BAR ─── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      margin: 1.2rem 1rem 0.5rem;
      flex-wrap: wrap;
    }

    .counter-box {
      background: #FEF3C7;
      border: 2px solid var(--primary);
      border-radius: 12px;
      padding: 0.5rem 1.4rem;
      font-size: 1.2rem;
      font-weight: 800;
      color: #78350F;
      font-family: 'Baloo 2', cursive;
    }

    .counter-box span {
      color: #D97706;
    }

    /* ─── BOARD ─── */
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      padding: 1rem 1.2rem 2rem;
      max-width: 720px;
      width: 100%;
    }

    @media (max-width: 560px) {
      .board {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        padding: 0.8rem 0.8rem 2rem;
      }
    }

    /* ─── CARD ─── */
    .card {
      width: 100%;
      aspect-ratio: 1 / 1;
      min-height: 140px;
      perspective: 800px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.6rem;
      text-align: center;
      overflow: hidden;
    }

    /* BACK FACE */
    .card-back {
      background: linear-gradient(135deg, #F59E0B, #FBBF24);
      border: 3px solid #D97706;
      box-shadow: var(--shadow);
    }

    .card-back .map-emoji {
      font-size: 2.6rem;
      line-height: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }

    /* FRONT FACE */
    .card-front {
      transform: rotateY(180deg);
      border: 3px solid var(--primary);
      box-shadow: var(--shadow);
    }

    .card-front.term-face {
      background: var(--card-term-bg);
    }

    .card-front.def-face {
      background: var(--card-def-bg);
    }

    .card-front .card-emoji {
      font-size: 1.8rem;
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    .card-front .card-label {
      font-size: 0.92rem;
      font-weight: 700;
      color: #44403C;
      line-height: 1.3;
    }

    .card-front.def-face .card-label {
      font-size: 0.88rem;
      font-weight: 700;
      color: #57534E;
    }

    /* SELECTED — pulsing amber border */
    .card.selected .card-inner .card-front {
      border-color: #F59E0B;
      animation: pulse-border 0.8s ease-in-out infinite alternate;
    }

    @keyframes pulse-border {
      from { box-shadow: 0 0 0 0 rgba(245,158,11,0.5); }
      to   { box-shadow: 0 0 0 6px rgba(245,158,11,0.0); }
    }

    /* MATCHED */
    .card.matched .card-front {
      background: var(--green-match) !important;
      border-color: var(--green-border) !important;
    }

    /* SHAKE on error */
    @keyframes shake {
      0%   { transform: rotateY(180deg) translateX(0); }
      20%  { transform: rotateY(180deg) translateX(-6px); }
      40%  { transform: rotateY(180deg) translateX(6px); }
      60%  { transform: rotateY(180deg) translateX(-4px); }
      80%  { transform: rotateY(180deg) translateX(4px); }
      100% { transform: rotateY(180deg) translateX(0); }
    }

    .card.shake .card-inner .card-front {
      animation: shake 0.5s ease;
    }

    /* ─── BUTTONS ─── */
    .btn-back {
      margin: 0.6rem auto 0.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #92400E;
      color: #FEF3C7;
      border: none;
      border-radius: 12px;
      padding: 0.65rem 1.4rem;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-back:hover { background: #78350F; transform: scale(1.04); }

    /* ─── WIN SCREEN ─── */
    .win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 251, 235, 0.97);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      animation: fadeIn 0.5s ease;
    }

    .win-overlay.visible { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .win-overlay .big-emoji {
      font-size: 5rem;
      animation: bounce 0.6s ease infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-12px); }
    }

    .win-overlay h2 {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      color: #78350F;
      margin: 1rem 0 0.5rem;
      line-height: 1.2;
    }

    .win-overlay .sub {
      font-size: 1.2rem;
      color: #92400E;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .win-overlay .motivational {
      font-size: 1.1rem;
      color: #57534E;
      margin-bottom: 1.8rem;
      max-width: 400px;
    }

    .win-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-replay {
      background: linear-gradient(135deg, #F59E0B, #FBBF24);
      color: #78350F;
      border: none;
      border-radius: 14px;
      padding: 0.75rem 2rem;
      font-size: 1.2rem;
      font-weight: 800;
      font-family: 'Baloo 2', cursive;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(245,158,11,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-replay:hover { transform: scale(1.06); box-shadow: 0 6px 18px rgba(245,158,11,0.5); }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <h1>🧠 Jogo da Memória</h1>
  <p>Parear termos e definições de Geografia</p>
</header>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="counter-box">Tentativas: <span id="attempts">0</span></div>
  <div class="counter-box">Pares encontrados: <span id="pairs">0</span>/6</div>
  <button class="btn-back" onclick="voltarAoPortal()">← Voltar ao Portal</button>
</div>

<!-- BOARD -->
<div class="board" id="board"></div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
  <div class="big-emoji">🎉</div>
  <h2>Parabéns, Lis!</h2>
  <p class="sub" id="winMsg">Você encontrou todos os pares em 0 tentativas!</p>
  <p class="motivational">Você é uma geógrafa incrível! Continue explorando e aprendendo sobre os lugares do mundo! 🌍</p>
  <div class="win-buttons">
    <button class="btn-replay" onclick="restartGame()">🔄 Jogar de novo</button>
    <button class="btn-back" onclick="voltarAoPortal()">← Voltar ao Portal</button>
  </div>
</div>

<script>
  // ─── DATA ───────────────────────────────────────────────────
  const PAIRS = [
    {
      id: 1,
      term: { emoji: '🔭', label: 'Visão Vertical' },
      def:  { label: 'Ver o objeto de CIMA PARA BAIXO (como um drone vendo a rua)' }
    },
    {
      id: 2,
      term: { emoji: '👁️', label: 'Visão Frontal' },
      def:  { label: 'Ver o objeto DE FRENTE (como olhar para uma porta)' }
    },
    {
      id: 3,
      term: { emoji: '↗️', label: 'Visão Oblíqua' },
      def:  { label: 'Ver de CIMA E DE LADO ao mesmo tempo' }
    },
    {
      id: 4,
      term: { emoji: '🗺️', label: 'Planta Cartográfica' },
      def:  { label: 'Desenho do espaço visto de CIMA (visão vertical, plana)' }
    },
    {
      id: 5,
      term: { emoji: '🏗️', label: 'Maquete' },
      def:  { label: 'Representação em 3D de um espaço real (tem altura!)' }
    },
    {
      id: 6,
      term: { emoji: '⭐', label: 'Ponto de Referência' },
      def:  { label: 'Lugar fixo e conhecido que ajuda a localizar outros lugares' }
    }
  ];

  // ─── AUDIO ──────────────────────────────────────────────────
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  function playTone(freqs, duration) {
    try {
      const ctx = getAudioCtx();
      const step = duration / freqs.length;
      freqs.forEach((freq, i) => {
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        const t = ctx.currentTime + i * step;
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + step);
        osc.start(t);
        osc.stop(t + step + 0.05);
      });
    } catch(e) {}
  }

  function soundCorrect() { playTone([523, 659, 784], 0.5); }
  function soundWrong()   { playTone([300, 200], 0.4); }

  // ─── STATE ──────────────────────────────────────────────────
  let cards   = [];
  let flipped = [];
  let matched = 0;
  let attempts = 0;
  let locked  = false;

  // ─── BUILD CARDS ────────────────────────────────────────────
  function buildCards() {
    const list = [];
    PAIRS.forEach(pair => {
      list.push({ pairId: pair.id, type: 'term', emoji: pair.term.emoji, label: pair.term.label });
      list.push({ pairId: pair.id, type: 'def',  emoji: null,            label: pair.def.label  });
    });
    return shuffle(list);
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ─── RENDER ─────────────────────────────────────────────────
  function renderBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    cards.forEach((card, idx) => {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.idx = idx;
      el.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back">
            <span class="map-emoji">🗺️</span>
          </div>
          <div class="card-face card-front ${card.type === 'term' ? 'term-face' : 'def-face'}">
            ${card.emoji ? `<span class="card-emoji">${card.emoji}</span>` : ''}
            <span class="card-label">${card.label}</span>
          </div>
        </div>
      `;
      el.addEventListener('click', () => onCardClick(idx, el));
      board.appendChild(el);
    });
  }

  // ─── LOGIC ──────────────────────────────────────────────────
  function onCardClick(idx, el) {
    if (locked) return;
    if (el.classList.contains('flipped') || el.classList.contains('matched')) return;
    if (flipped.length === 2) return;

    el.classList.add('flipped', 'selected');
    flipped.push({ idx, el });

    if (flipped.length === 2) {
      attempts++;
      document.getElementById('attempts').textContent = attempts;
      locked = true;

      const [a, b] = flipped;
      const ca = cards[a.idx];
      const cb = cards[b.idx];

      if (ca.pairId === cb.pairId && ca.type !== cb.type) {
        // CORRECT MATCH
        setTimeout(() => {
          a.el.classList.add('matched');
          b.el.classList.add('matched');
          a.el.classList.remove('selected');
          b.el.classList.remove('selected');
          matched++;
          document.getElementById('pairs').textContent = matched;
          soundCorrect();
          flipped = [];
          locked  = false;
          if (matched === 6) setTimeout(showWin, 500);
        }, 300);
      } else {
        // WRONG MATCH
        soundWrong();
        setTimeout(() => {
          a.el.classList.add('shake');
          b.el.classList.add('shake');
          setTimeout(() => {
            a.el.classList.remove('shake', 'flipped', 'selected');
            b.el.classList.remove('shake', 'flipped', 'selected');
            flipped = [];
            locked  = false;
          }, 500);
        }, 700);
      }
    }
  }

  function showWin() {
    document.getElementById('winMsg').textContent =
      `Você encontrou todos os pares em ${attempts} tentativa${attempts === 1 ? '' : 's'}!`;
    document.getElementById('winOverlay').classList.add('visible');
    playTone([523, 587, 659, 698, 784, 880], 0.9);
  }

  function restartGame() {
    document.getElementById('winOverlay').classList.remove('visible');
    attempts = 0;
    matched  = 0;
    flipped  = [];
    locked   = false;
    document.getElementById('attempts').textContent = '0';
    document.getElementById('pairs').textContent    = '0';
    cards = buildCards();
    renderBoard();
  }

  // ─── INIT ───────────────────────────────────────────────────
  cards = buildCards();
  renderBoard();
</script>
<script src="../../shared/portal-back.js"></script>
</body>
</html>
