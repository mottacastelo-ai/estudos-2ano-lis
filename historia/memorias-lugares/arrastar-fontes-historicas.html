<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fontes Históricas — Arrastar e Soltar | Portal da Lis</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root { --primary: #A855F7; --light: #D08EF8; --bg: #FAF5FF; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; }
header {
  background: linear-gradient(135deg, #4A1272, #A855F7 60%, #D08EF8);
  padding: 22px 24px 18px; color: #fff; text-align: center;
}
header h1 { font-family: 'Baloo 2', cursive; font-size: 1.7rem; font-weight: 900; }
header p { font-size: 1rem; opacity: 0.9; font-weight: 600; margin-top: 4px; }
.container { max-width: 800px; margin: 0 auto; padding: 28px 20px 60px; }
.instructions {
  background: #fff; border-radius: 16px; padding: 18px 22px;
  border: 2px solid #E9D5FF; margin-bottom: 24px;
  font-size: 1.15rem; font-weight: 700; color: #4A1272; text-align: center;
}
.cards-pool {
  display: flex; flex-wrap: wrap; gap: 12px;
  justify-content: center; margin-bottom: 32px;
  background: #fff; border-radius: 20px; padding: 22px;
  border: 2px dashed #D08EF8; min-height: 80px;
}
.drag-card {
  background: linear-gradient(135deg, #EDE9FE, #F5F3FF);
  border: 2px solid #A855F7; border-radius: 14px;
  padding: 14px 20px; cursor: grab;
  font-size: 1.05rem; font-weight: 800; color: #4A1272;
  transition: all 0.18s; user-select: none;
  display: flex; align-items: center; gap: 8px;
}
.drag-card:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(168,85,247,0.25); }
.drag-card.dragging { opacity: 0.4; }
.categories {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px; margin-bottom: 28px;
}
@media (max-width: 600px) { .categories { grid-template-columns: 1fr; } }
.cat-box {
  background: #fff; border-radius: 20px; padding: 20px;
  border: 3px solid #E9D5FF; min-height: 200px;
  transition: all 0.2s;
}
.cat-box.drag-over { border-color: var(--primary); background: #F5F3FF; }
.cat-title {
  font-family: 'Baloo 2', cursive; font-size: 1.3rem; font-weight: 900;
  text-align: center; margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 2px solid #E9D5FF;
}
.cat-box.visual .cat-title { color: #7C3AED; }
.cat-box.oral .cat-title { color: #BE185D; }
.cat-items { display: flex; flex-direction: column; gap: 8px; min-height: 120px; }
.placed-card {
  border-radius: 12px; padding: 12px 16px;
  font-size: 1rem; font-weight: 700;
  display: flex; align-items: center; gap: 8px;
  cursor: grab;
}
.cat-box.visual .placed-card { background: #F3E8FF; color: #6D28D9; border: 2px solid #C4B5FD; }
.cat-box.oral .placed-card { background: #FCE7F3; color: #9D174D; border: 2px solid #F9A8D4; }
.placed-card.correct { background: #DCFCE7 !important; color: #15803D !important; border-color: #86EFAC !important; }
.placed-card.wrong { background: #FEE2E2 !important; color: #B91C1C !important; border-color: #FCA5A5 !important; }
.check-btn {
  display: block; width: 100%; max-width: 360px; margin: 0 auto 16px;
  background: var(--primary); color: #fff; border: none;
  border-radius: 14px; padding: 16px;
  font-family: 'Baloo 2', cursive; font-size: 1.2rem; font-weight: 800;
  cursor: pointer; transition: all 0.18s;
}
.check-btn:hover { background: #9333EA; }
.check-btn:disabled { opacity: 0.5; cursor: default; }
.result-msg {
  background: #fff; border-radius: 16px; padding: 20px;
  text-align: center; font-size: 1.2rem; font-weight: 800;
  border: 2px solid #E9D5FF; margin-bottom: 16px; display: none;
}
.action-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.retry-btn {
  background: var(--primary); border: none; color: #fff; border-radius: 14px;
  padding: 14px 28px; font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 800;
  cursor: pointer; transition: all 0.18s;
}
.retry-btn:hover { background: #9333EA; }
.back-btn {
  background: #fff; border: 2px solid var(--primary); color: var(--primary);
  border-radius: 14px; padding: 14px 28px;
  font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 800;
  cursor: pointer; transition: all 0.18s;
}
.back-btn:hover { background: var(--bg); }
</style>
</head>
<body>
<header>
  <h1>🔍 Fontes Históricas</h1>
  <p>📸 Arraste cada exemplo para o lugar certo!</p>
</header>
<div class="container">
  <div class="instructions">
    👇 Arraste cada cartão para a categoria correta: <strong>Fonte Visual 👁️</strong> ou <strong>Fonte Oral 🗣️</strong>
  </div>

  <div class="cards-pool" id="pool">
    <!-- cards gerados pelo JS -->
  </div>

  <div class="categories">
    <div class="cat-box visual" id="cat-visual"
      ondragover="ev.preventDefault(); this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="dropCard(event,'visual')">
      <div class="cat-title">👁️ Fonte Histórica Visual</div>
      <div class="cat-items" id="items-visual"></div>
    </div>
    <div class="cat-box oral" id="cat-oral"
      ondragover="ev.preventDefault(); this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="dropCard(event,'oral')">
      <div class="cat-title">🗣️ Fonte Histórica Oral</div>
      <div class="cat-items" id="items-oral"></div>
    </div>
  </div>

  <button class="check-btn" id="check-btn" onclick="checkAnswers()">✅ Verificar Respostas</button>
  <div class="result-msg" id="result-msg"></div>
  <div class="action-btns">
    <button class="back-btn" onclick="window.close()">⬅️ Voltar ao Portal</button>
    <button class="retry-btn" onclick="resetGame()">🔄 Tentar de Novo</button>
  </div>
</div>
<script>
const items = [
  { id: 'i1', emoji: '📷', text: 'Fotografia de uma rua antiga', cat: 'visual' },
  { id: 'i2', emoji: '🎙️', text: 'Depoimento de um morador antigo', cat: 'oral' },
  { id: 'i3', emoji: '🖼️', text: 'Pintura de uma cidade do passado', cat: 'visual' },
  { id: 'i4', emoji: '👴', text: 'Entrevista com pessoa de 80 anos', cat: 'oral' },
  { id: 'i5', emoji: '📰', text: 'Desenho de como era um bairro', cat: 'visual' },
  { id: 'i6', emoji: '🎤', text: 'Gravação de um relato de memória', cat: 'oral' },
  { id: 'i7', emoji: '🗺️', text: 'Mapa antigo da cidade', cat: 'visual' },
  { id: 'i8', emoji: '💬', text: 'Conversa sobre como era antes', cat: 'oral' }
];

let placed = {};
let draggedId = null;

function buildPool() {
  const pool = document.getElementById('pool');
  pool.innerHTML = '';
  const shuffled = [...items].sort(() => Math.random() - 0.5);
  shuffled.forEach(item => {
    if (!placed[item.id]) {
      const card = createCard(item, 'pool');
      pool.appendChild(card);
    }
  });
  document.getElementById('items-visual').innerHTML = '';
  document.getElementById('items-oral').innerHTML = '';
  Object.entries(placed).forEach(([id, cat]) => {
    const item = items.find(i => i.id === id);
    const card = createCard(item, cat);
    document.getElementById('items-' + cat).appendChild(card);
  });
}

function createCard(item, loc) {
  const card = document.createElement('div');
  card.className = loc === 'pool' ? 'drag-card' : 'placed-card';
  card.id = 'card-' + item.id;
  card.draggable = true;
  card.innerHTML = `${item.emoji} ${item.text}`;
  card.dataset.id = item.id;
  card.ondragstart = (e) => {
    draggedId = item.id;
    card.classList.add('dragging');
  };
  card.ondragend = () => card.classList.remove('dragging');
  return card;
}

function dropCard(e, cat) {
  e.preventDefault();
  document.getElementById('cat-' + cat).classList.remove('drag-over');
  if (!draggedId) return;
  placed[draggedId] = cat;
  buildPool();
  draggedId = null;
}

// Also allow dropping back to pool
document.getElementById('pool').ondragover = (e) => e.preventDefault();
document.getElementById('pool').ondrop = (e) => {
  e.preventDefault();
  if (!draggedId) return;
  delete placed[draggedId];
  buildPool();
  draggedId = null;
};

// Touch support
let touchItem = null;
document.addEventListener('touchstart', (e) => {
  const card = e.target.closest('.drag-card, .placed-card');
  if (!card) return;
  touchItem = card.dataset.id;
  card.style.opacity = '0.6';
}, { passive: true });
document.addEventListener('touchend', (e) => {
  if (!touchItem) return;
  const touch = e.changedTouches[0];
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  const catBox = el ? el.closest('.cat-box') : null;
  const pool = el ? el.closest('#pool') : null;
  if (catBox) {
    const cat = catBox.classList.contains('visual') ? 'visual' : 'oral';
    placed[touchItem] = cat;
  } else if (pool) {
    delete placed[touchItem];
  }
  document.querySelectorAll('.drag-card, .placed-card').forEach(c => c.style.opacity = '');
  touchItem = null;
  buildPool();
}, { passive: true });

function checkAnswers() {
  if (Object.keys(placed).length < items.length) {
    document.getElementById('result-msg').textContent = '⚠️ Arraste todos os cartões antes de verificar!';
    document.getElementById('result-msg').style.display = 'block';
    document.getElementById('result-msg').style.color = '#92400E';
    return;
  }
  let correct = 0;
  items.forEach(item => {
    const card = document.getElementById('card-' + item.id);
    if (!card) return;
    card.classList.remove('correct', 'wrong');
    if (placed[item.id] === item.cat) { card.classList.add('correct'); correct++; }
    else card.classList.add('wrong');
  });
  const msg = document.getElementById('result-msg');
  msg.style.display = 'block';
  if (correct === items.length) {
    msg.textContent = `🏆 Perfeito! Você classificou todos os ${items.length} cartões corretamente! Incrível detetive da história!`;
    msg.style.color = '#15803D';
    playSound('correct');
  } else {
    msg.textContent = `✨ Você acertou ${correct} de ${items.length}! Os erros estão em vermelho. Tente de novo!`;
    msg.style.color = '#92400E';
    playSound('wrong');
  }
  document.getElementById('check-btn').disabled = true;
}

function resetGame() {
  placed = {};
  document.getElementById('result-msg').style.display = 'none';
  document.getElementById('check-btn').disabled = false;
  buildPool();
}

function playSound(type) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  if (type === 'correct') {
    o.frequency.setValueAtTime(523, ctx.currentTime);
    o.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
    o.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    o.start(); o.stop(ctx.currentTime + 0.5);
  } else {
    o.frequency.setValueAtTime(300, ctx.currentTime);
    o.frequency.setValueAtTime(200, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    o.start(); o.stop(ctx.currentTime + 0.4);
  }
}

buildPool();
</script>
</body>
</html>
