<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Memória — Bilhete e Cartão Pessoal | Portal da Lis</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #E8430A;
  --light: #FB8C5A;
  --bg: #FFF4EF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  font-size: 1.2rem;
  background: var(--bg);
  min-height: 100vh;
  padding-bottom: 40px;
}
.header {
  background: linear-gradient(135deg, #7A1F04, #E8430A 60%, #FB8C5A);
  color: #fff;
  padding: 24px 20px 20px;
  text-align: center;
}
.header .emoji { font-size: 2.8rem; display: block; margin-bottom: 6px; }
.header h1 {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.6rem;
  font-weight: 900;
  line-height: 1.2;
}
.header p { font-size: 1rem; opacity: 0.9; margin-top: 4px; }

.container { max-width: 720px; margin: 0 auto; padding: 20px 16px; }

.instrucao {
  background: #fff;
  border-radius: 16px;
  padding: 16px 20px;
  margin-bottom: 20px;
  border: 2px solid #ffd6c0;
  font-size: 1.05rem;
  color: #3a1a0a;
  line-height: 1.5;
}
.instrucao strong { color: var(--primary); }

.placar-area {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  gap: 12px;
  flex-wrap: wrap;
}
.placar-item {
  background: #fff;
  border-radius: 14px;
  padding: 10px 20px;
  text-align: center;
  border: 2px solid #ffd6c0;
  flex: 1;
  min-width: 100px;
}
.placar-item .val {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.8rem;
  font-weight: 900;
  color: var(--primary);
  line-height: 1;
}
.placar-item .lbl {
  font-size: 0.85rem;
  font-weight: 700;
  color: #9B4420;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* Grade de cartas */
.memory-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.card-wrap {
  perspective: 600px;
  height: 100px;
  cursor: pointer;
}
.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.35s ease;
  border-radius: 14px;
}
.card-wrap.virada .card-inner { transform: rotateY(180deg); }
.card-wrap.pareada .card-inner { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 14px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  text-align: center;
  font-weight: 800;
  font-size: 0.95rem;
  line-height: 1.3;
}
.card-back {
  background: linear-gradient(135deg, #E8430A, #FB8C5A);
  color: #fff;
  font-size: 1.8rem;
  box-shadow: 0 3px 10px rgba(232,67,10,0.25);
  border: 3px solid rgba(255,255,255,0.3);
}
.card-back::after { content: '📝'; }
.card-front {
  transform: rotateY(180deg);
  box-shadow: 0 3px 10px rgba(0,0,0,0.10);
  border: 3px solid #ffd6c0;
  font-size: 0.88rem;
}

/* Tipo A = conceito (laranja claro) */
.card-front.tipo-a {
  background: #fff4ef;
  color: #7A1F04;
  border-color: #FB8C5A;
}
/* Tipo B = definição (branco) */
.card-front.tipo-b {
  background: #fff;
  color: #3a1a0a;
  border-color: #ffd6c0;
}

.card-wrap.pareada .card-front {
  background: #dcfce7 !important;
  border-color: #86efac !important;
  color: #166534 !important;
}
.card-wrap.errada .card-front {
  background: #fee2e2 !important;
  border-color: #fca5a5 !important;
}

/* Resultado final */
.resultado-final {
  display: none;
  background: #fff;
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 4px 20px rgba(232,67,10,0.12);
  border: 2px solid #ffd6c0;
  margin-top: 8px;
}
.resultado-final .trophy { font-size: 4.5rem; display: block; margin-bottom: 12px; }
.resultado-final h2 {
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.8rem;
  color: var(--primary);
  margin-bottom: 8px;
}
.resultado-final .stat { font-size: 1.15rem; color: #5a2a10; margin-bottom: 6px; font-weight: 700; }
.resultado-final .msg { font-size: 1.1rem; color: #5a2a10; margin: 10px 0 20px; line-height: 1.5; }
.btn-retry {
  padding: 14px 32px;
  background: linear-gradient(135deg, #E8430A, #FB8C5A);
  color: #fff;
  border: none;
  border-radius: 50px;
  font-family: 'Baloo 2', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(232,67,10,0.25);
  min-height: 50px;
  min-width: 180px;
}

.footer { text-align: center; margin-top: 32px; }
.btn-back {
  display: inline-block;
  padding: 12px 28px;
  background: #fff;
  border: 2px solid var(--primary);
  border-radius: 50px;
  color: var(--primary);
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  text-decoration: none;
  min-height: 44px;
}
.btn-back:hover { background: var(--bg); }

@media (max-width: 480px) {
  body { padding: 12px; font-size: 1rem; }
  .header h1 { font-size: 1.3rem; }
  .memory-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .card-wrap { height: 76px; }
  .card-face { font-size: 0.78rem; padding: 5px; }
  .card-back { font-size: 1.4rem; }
  .placar-item .val { font-size: 1.4rem; }
}
</style>
</head>
<body>

<div class="header">
  <span class="emoji">📝</span>
  <h1>Jogo da Memória</h1>
  <p>Bilheto diz: encontre cada conceito com sua definição!</p>
</div>

<div class="container">

  <div class="instrucao">
    <strong>Como jogar:</strong> Clique em uma carta laranja (conceito) e depois em uma carta branca (definição). Se formarem um par, ficam viradas! Encontre todos os 6 pares. 🃏
  </div>

  <div class="placar-area">
    <div class="placar-item">
      <div class="val" id="val-pares">0/6</div>
      <div class="lbl">Pares</div>
    </div>
    <div class="placar-item">
      <div class="val" id="val-tentativas">0</div>
      <div class="lbl">Tentativas</div>
    </div>
    <div class="placar-item">
      <div class="val" id="val-erros">0</div>
      <div class="lbl">Erros</div>
    </div>
  </div>

  <div class="memory-grid" id="memory-grid"></div>

  <div class="resultado-final" id="resultado-final">
    <span class="trophy" id="trophy-emoji"></span>
    <h2 id="res-titulo"></h2>
    <div class="stat" id="res-stat"></div>
    <p class="msg" id="res-msg"></p>
    <button class="btn-retry" onclick="reiniciarJogo()">Jogar de novo 🔄</button>
  </div>

  <div class="footer" id="footer-back" style="display:none;">
    <a href="../../index.html" class="btn-back">← Voltar ao Portal</a>
  </div>
</div>

<script>
(function () {

// Pares: cada par tem id único, texto do conceito (tipo-a) e texto da definição (tipo-b)
// Rastreabilidade: todos os termos vêm de termos_tecnicos ou do conteúdo do JSON de input
var pares = [
  { id: 1, conceito: "Bilhete",         definicao: "Mensagem curta e informal" },
  { id: 2, conceito: "Destinatário",    definicao: "Quem vai receber" },
  { id: 3, conceito: "Remetente",       definicao: "Quem escreve e envia" },
  { id: 4, conceito: "Cartão pessoal",  definicao: "Mensagem especial no papel" },
  { id: 5, conceito: "Cartão virtual",  definicao: "Mensagem enviada pela internet" },
  { id: 6, conceito: "Narrador",        definicao: "Quem conta a história" }
];

var cartas = [];          // array de objetos {id, pairId, tipo, texto, el, virada, pareada}
var viradas = [];         // cartas viradas aguardando conferência
var tentativas = 0;
var paresEncontrados = 0;
var erros = 0;
var bloqueado = false;

function embaralhar(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function construirCartas() {
  cartas = [];
  pares.forEach(function(par) {
    cartas.push({ id: cartas.length, pairId: par.id, tipo: 'a', texto: par.conceito,  virada: false, pareada: false });
    cartas.push({ id: cartas.length, pairId: par.id, tipo: 'b', texto: par.definicao, virada: false, pareada: false });
  });
  cartas = embaralhar(cartas);
}

function renderGrid() {
  var grid = document.getElementById('memory-grid');
  grid.innerHTML = '';
  cartas.forEach(function(carta, idx) {
    var wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.setAttribute('data-idx', idx);
    wrap.innerHTML =
      '<div class="card-inner">' +
        '<div class="card-face card-back"></div>' +
        '<div class="card-face card-front tipo-' + carta.tipo + '">' +
          carta.texto +
        '</div>' +
      '</div>';
    wrap.addEventListener('click', function() { clicarCarta(idx); });

    // Suporte touch
    wrap.addEventListener('touchend', function(e) {
      e.preventDefault();
      clicarCarta(idx);
    });

    carta.el = wrap;
    grid.appendChild(wrap);
  });
}

function clicarCarta(idx) {
  if (bloqueado) return;
  var carta = cartas[idx];
  if (carta.virada || carta.pareada) return;

  carta.virada = true;
  carta.el.classList.add('virada');
  viradas.push(carta);
  playMemSound('flip');

  if (viradas.length === 2) {
    tentativas++;
    atualizarPlacar();
    verificarPar();
  }
}

function verificarPar() {
  bloqueado = true;
  var c1 = viradas[0];
  var c2 = viradas[1];

  if (c1.pairId === c2.pairId && c1.tipo !== c2.tipo) {
    // Par correto
    setTimeout(function() {
      c1.pareada = true; c2.pareada = true;
      c1.el.classList.remove('virada'); c1.el.classList.add('pareada');
      c2.el.classList.remove('virada'); c2.el.classList.add('pareada');
      viradas = [];
      paresEncontrados++;
      atualizarPlacar();
      playMemSound('correct');
      bloqueado = false;
      if (paresEncontrados === pares.length) {
        setTimeout(mostrarResultado, 600);
      }
    }, 500);
  } else {
    // Errado
    erros++;
    c1.el.classList.add('errada'); c2.el.classList.add('errada');
    setTimeout(function() {
      c1.virada = false; c2.virada = false;
      c1.el.classList.remove('virada', 'errada');
      c2.el.classList.remove('virada', 'errada');
      viradas = [];
      atualizarPlacar();
      playMemSound('wrong');
      bloqueado = false;
    }, 900);
  }
}

function atualizarPlacar() {
  document.getElementById('val-pares').textContent = paresEncontrados + '/' + pares.length;
  document.getElementById('val-tentativas').textContent = tentativas;
  document.getElementById('val-erros').textContent = erros;
}

function mostrarResultado() {
  window.sabendoScore = Math.max(0, Math.round(100 - (erros / tentativas) * 60));

  var trophy, titulo, msg;
  if (erros === 0) {
    trophy = '🏆'; titulo = 'Incrível! Zero erros!';
    msg = 'Você tem uma memória de elefante! Bilheto ficou impressionado! 🎉';
  } else if (erros <= 4) {
    trophy = '⭐'; titulo = 'Muito bem!';
    msg = 'Só ' + erros + ' erro(s)! Você conhece bem os conceitos do bilhete! 📝';
  } else if (erros <= 8) {
    trophy = '💪'; titulo = 'Bom jogo!';
    msg = 'Com ' + erros + ' erros, mas encontrou todos os pares! Continue praticando! 😊';
  } else {
    trophy = '🌱'; titulo = 'Continue jogando!';
    msg = 'A memória melhora com a prática! Tente de novo! 💛';
  }

  document.getElementById('trophy-emoji').textContent = trophy;
  document.getElementById('res-titulo').textContent = titulo;
  document.getElementById('res-stat').textContent =
    tentativas + ' tentativas · ' + erros + ' erros · ' + paresEncontrados + ' pares encontrados';
  document.getElementById('res-msg').textContent = msg;
  document.getElementById('resultado-final').style.display = 'block';
  document.getElementById('footer-back').style.display = 'block';
  document.getElementById('resultado-final').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function reiniciarJogo() {
  tentativas = 0; paresEncontrados = 0; erros = 0;
  viradas = []; bloqueado = false;
  document.getElementById('resultado-final').style.display = 'none';
  document.getElementById('footer-back').style.display = 'none';
  atualizarPlacar();
  construirCartas();
  renderGrid();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function playMemSound(tipo) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var o = ctx.createOscillator();
    var g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if (tipo === 'flip') {
      o.frequency.setValueAtTime(440, ctx.currentTime);
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.start(); o.stop(ctx.currentTime + 0.15);
    } else if (tipo === 'correct') {
      o.frequency.setValueAtTime(523, ctx.currentTime);
      o.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      o.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o.start(); o.stop(ctx.currentTime + 0.5);
    } else {
      o.frequency.setValueAtTime(300, ctx.currentTime);
      o.frequency.setValueAtTime(200, ctx.currentTime + 0.15);
      g.gain.setValueAtTime(0.25, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      o.start(); o.stop(ctx.currentTime + 0.4);
    }
  } catch(e) {}
}

// Iniciar
construirCartas();
renderGrid();

window.reiniciarJogo = reiniciarJogo;

})();
</script>
