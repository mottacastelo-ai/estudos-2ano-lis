<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Mental — Convivência entre as Pessoas | Portal da Lis</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root { --primary: #A855F7; --light: #D08EF8; --bg: #FAF5FF; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; }
header {
  background: linear-gradient(135deg, #4A1272, #A855F7 60%, #D08EF8);
  padding: 22px 24px 18px; color: #fff; text-align: center;
}
header h1 { font-family: 'Baloo 2', cursive; font-size: 1.7rem; font-weight: 900; }
header p { font-size: 1rem; opacity: 0.9; font-weight: 600; margin-top: 4px; }
.container { max-width: 820px; margin: 0 auto; padding: 28px 20px 60px; }
.instructions {
  background: #fff; border-radius: 16px; padding: 18px 22px;
  border: 2px solid #E9D5FF; margin-bottom: 24px;
  font-size: 1.1rem; font-weight: 700; color: #4A1272; text-align: center;
}
.map-area {
  background: #fff; border-radius: 24px; padding: 32px 20px;
  border: 2px solid #E9D5FF; box-shadow: 0 4px 24px rgba(168,85,247,0.1);
  margin-bottom: 24px;
}
.center-node {
  background: linear-gradient(135deg, #6D28D9, #A855F7);
  color: #fff; border-radius: 20px; padding: 18px 28px;
  font-family: 'Baloo 2', cursive; font-size: 1.4rem; font-weight: 900;
  text-align: center; width: fit-content; margin: 0 auto 32px;
  box-shadow: 0 4px 18px rgba(109,40,217,0.3);
}
.slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.slot {
  border: 3px dashed #D08EF8; border-radius: 16px; padding: 16px;
  min-height: 90px; transition: all 0.2s;
  display: flex; flex-direction: column; gap: 8px;
}
.slot.drag-over { border-color: var(--primary); background: #F5F3FF; }
.slot-label { font-size: 0.8rem; font-weight: 800; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.08em; }
.slot-hint { font-size: 0.88rem; font-weight: 700; color: #C4B5FD; font-style: italic; }
.placed-node {
  background: linear-gradient(135deg, #EDE9FE, #F5F3FF);
  border: 2px solid #A855F7; border-radius: 12px;
  padding: 12px 14px; font-size: 1rem; font-weight: 800;
  color: #4A1272; cursor: grab; display: flex; align-items: center; gap: 8px;
  transition: all 0.18s;
}
.placed-node:hover { transform: scale(1.03); }
.placed-node.correct { background: #DCFCE7 !important; color: #15803D !important; border-color: #86EFAC !important; }
.placed-node.wrong { background: #FEE2E2 !important; color: #B91C1C !important; border-color: #FCA5A5 !important; }
.nodes-pool {
  display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
  background: #F8F4FF; border-radius: 16px; padding: 18px;
  border: 2px dashed #E9D5FF; margin-bottom: 24px; min-height: 70px;
}
.pool-node {
  background: linear-gradient(135deg, #EDE9FE, #F5F3FF);
  border: 2px solid #A855F7; border-radius: 12px;
  padding: 12px 16px; font-size: 1rem; font-weight: 800;
  color: #4A1272; cursor: grab; user-select: none;
  transition: all 0.18s; display: flex; align-items: center; gap: 6px;
}
.pool-node:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(168,85,247,0.2); }
.pool-node.dragging { opacity: 0.4; }
.check-btn { display: block; width: 100%; max-width: 360px; margin: 0 auto 16px; background: var(--primary); color: #fff; border: none; border-radius: 14px; padding: 16px; font-family: 'Baloo 2', cursive; font-size: 1.2rem; font-weight: 800; cursor: pointer; transition: all 0.18s; }
.check-btn:hover { background: #9333EA; }
.check-btn:disabled { opacity: 0.5; cursor: default; }
.result-msg { background: #fff; border-radius: 16px; padding: 20px; text-align: center; font-size: 1.15rem; font-weight: 800; border: 2px solid #E9D5FF; margin-bottom: 16px; display: none; line-height: 1.5; }
.action-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.retry-btn { background: var(--primary); border: none; color: #fff; border-radius: 14px; padding: 14px 28px; font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 800; cursor: pointer; }
.retry-btn:hover { background: #9333EA; }
.back-btn { background: #fff; border: 2px solid var(--primary); color: var(--primary); border-radius: 14px; padding: 14px 28px; font-family: 'Baloo 2', cursive; font-size: 1.1rem; font-weight: 800; cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1>🗺️ Mapa Mental</h1>
  <p>🥁 Tambô embaralhou os conceitos! Coloque cada um no lugar certo!</p>
</header>
<div class="container">
  <div class="instructions">
    👇 Arraste os cartões do banco abaixo para completar o mapa mental sobre <strong>Convivência entre as Pessoas</strong>
  </div>

  <div class="nodes-pool" id="pool"
    ondragover="event.preventDefault()"
    ondrop="dropToPool(event)">
  </div>

  <div class="map-area">
    <div class="center-node">🤝 Convivência entre as Pessoas</div>
    <div class="slots-grid" id="slots-grid"></div>
  </div>

  <button class="check-btn" id="check-btn" onclick="checkMap()">✅ Verificar Mapa</button>
  <div class="result-msg" id="result-msg"></div>
  <div class="action-btns">
    <button class="back-btn" onclick="window.close()">⬅️ Voltar ao Portal</button>
    <button class="retry-btn" onclick="resetMap()">🔄 Recomeçar</button>
  </div>
</div>
<script>
const slots = [
  { id: 's1', label: 'Lugar de convivência em Niterói, RJ', hint: 'Pescadores se reúnem aqui...', correct: 'n1' },
  { id: 's2', label: 'Comunidade no Pará com tradições africanas', hint: 'Descendentes de africanos...', correct: 'n2' },
  { id: 's3', label: 'Atitude importante para conviver bem', hint: 'O que devemos ter com os outros...', correct: 'n3' },
  { id: 's4', label: 'Quando muitas pessoas se reúnem', hint: 'Um grupo com algo em comum...', correct: 'n4' },
  { id: 's5', label: 'Arte e cultura do Nordeste', hint: 'Ritmo com tambores e dança...', correct: 'n5' }
];
const nodes = [
  { id: 'n1', emoji: '🐟', text: 'Quintal dos Pescadores' },
  { id: 'n2', emoji: '🌿', text: 'Quilombola' },
  { id: 'n3', emoji: '🤝', text: 'Respeito' },
  { id: 'n4', emoji: '👥', text: 'Comunidade' },
  { id: 'n5', emoji: '🥁', text: 'Maracatu' }
];

let placed = {}, draggedNode = null;

function buildMap() {
  const pool = document.getElementById('pool');
  pool.innerHTML = '';
  nodes.forEach(node => {
    if (!Object.values(placed).includes(node.id)) {
      const el = document.createElement('div');
      el.className = 'pool-node'; el.id = 'node-' + node.id;
      el.draggable = true; el.dataset.nid = node.id;
      el.innerHTML = `${node.emoji} ${node.text}`;
      el.ondragstart = () => { draggedNode = node.id; el.classList.add('dragging'); };
      el.ondragend = () => el.classList.remove('dragging');
      pool.appendChild(el);
    }
  });
  const grid = document.getElementById('slots-grid');
  grid.innerHTML = '';
  slots.forEach(slot => {
    const div = document.createElement('div');
    div.className = 'slot'; div.id = 'slot-' + slot.id;
    div.innerHTML = `<div class="slot-label">${slot.label}</div>`;
    if (placed[slot.id]) {
      const node = nodes.find(n => n.id === placed[slot.id]);
      const pn = document.createElement('div');
      pn.className = 'placed-node'; pn.id = 'placed-' + slot.id;
      pn.dataset.nid = node.id; pn.draggable = true;
      pn.innerHTML = `${node.emoji} ${node.text}`;
      pn.ondragstart = () => { draggedNode = node.id; pn.classList.add('dragging'); };
      pn.ondragend = () => pn.classList.remove('dragging');
      div.appendChild(pn);
    } else {
      const hint = document.createElement('div');
      hint.className = 'slot-hint'; hint.textContent = slot.hint;
      div.appendChild(hint);
    }
    div.ondragover = (e) => { e.preventDefault(); div.classList.add('drag-over'); };
    div.ondragleave = () => div.classList.remove('drag-over');
    div.ondrop = (e) => {
      e.preventDefault(); div.classList.remove('drag-over');
      if (!draggedNode) return;
      Object.keys(placed).forEach(k => { if (placed[k] === draggedNode) delete placed[k]; });
      placed[slot.id] = draggedNode; draggedNode = null; buildMap();
    };
    grid.appendChild(div);
  });
}

function dropToPool(e) {
  e.preventDefault();
  if (!draggedNode) return;
  Object.keys(placed).forEach(k => { if (placed[k] === draggedNode) delete placed[k]; });
  draggedNode = null; buildMap();
}

let touchNodeId = null;
document.addEventListener('touchstart', (e) => {
  const el = e.target.closest('.pool-node, .placed-node');
  if (!el) return; touchNodeId = el.dataset.nid; el.style.opacity = '0.5';
}, { passive: true });
document.addEventListener('touchend', (e) => {
  if (!touchNodeId) return;
  const t = e.changedTouches[0];
  const target = document.elementFromPoint(t.clientX, t.clientY);
  const slot = target ? target.closest('.slot') : null;
  const pool = target ? target.closest('#pool') : null;
  if (slot) {
    const slotId = slot.id.replace('slot-', '');
    Object.keys(placed).forEach(k => { if (placed[k] === touchNodeId) delete placed[k]; });
    placed[slotId] = touchNodeId;
  } else if (pool) {
    Object.keys(placed).forEach(k => { if (placed[k] === touchNodeId) delete placed[k]; });
  }
  document.querySelectorAll('.pool-node, .placed-node').forEach(n => n.style.opacity = '');
  touchNodeId = null; buildMap();
}, { passive: true });

function checkMap() {
  let correct = 0;
  slots.forEach(slot => {
    const el = document.getElementById('placed-' + slot.id);
    if (!el) return;
    el.classList.remove('correct', 'wrong');
    if (placed[slot.id] === slot.correct) { el.classList.add('correct'); correct++; }
    else el.classList.add('wrong');
  });
  const msg = document.getElementById('result-msg');
  msg.style.display = 'block';
  if (correct === slots.length) {
    msg.innerHTML = `🥁 <strong>Mapa completo e perfeito!</strong><br>Você dominou todos os conceitos de convivência! Tambô está tocando de alegria! 🎵✨`;
    msg.style.color = '#15803D';
    playSound('correct');
  } else {
    msg.innerHTML = `✨ Você acertou <strong>${correct} de ${slots.length}</strong>!<br>Os erros estão em vermelho — ajuste e tente de novo!`;
    msg.style.color = '#92400E';
    playSound('wrong');
  }
  document.getElementById('check-btn').disabled = true;
}

function resetMap() {
  placed = {};
  document.getElementById('result-msg').style.display = 'none';
  document.getElementById('check-btn').disabled = false;
  buildMap();
}

function playSound(type) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  if (type === 'correct') {
    o.frequency.setValueAtTime(523, ctx.currentTime);
    o.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
    o.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    o.start(); o.stop(ctx.currentTime + 0.5);
  } else {
    o.frequency.setValueAtTime(300, ctx.currentTime);
    o.frequency.setValueAtTime(200, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    o.start(); o.stop(ctx.currentTime + 0.4);
  }
}
buildMap();
</script>
</body>
</html>
