<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corrida Ordenada — Números Ordinais | Portal da Lis</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0AACE8;
  --light: #5AC8FB;
  --bg: #EFF9FF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

.header {
  width: 100%;
  background: linear-gradient(135deg, #044A7A, #0AACE8 60%, #5AC8FB);
  color: white;
  text-align: center;
  padding: 20px 16px 24px;
}
.header h1 { font-family: 'Baloo 2', sans-serif; font-size: 1.8rem; font-weight: 900; }
.header p { font-size: 1.1rem; margin-top: 6px; opacity: 0.92; }

.instrucao {
  background: white;
  border-radius: 16px;
  padding: 16px 24px;
  margin: 20px 16px 0;
  font-size: 1.3rem;
  font-weight: 700;
  color: #044A7A;
  text-align: center;
  box-shadow: 0 2px 12px rgba(10,172,232,0.12);
  max-width: 620px;
  width: calc(100% - 32px);
}

.progress-bar-wrap {
  width: calc(100% - 32px);
  max-width: 620px;
  margin: 14px 16px 0;
}
.progress-bar { height: 10px; background: #BFDBFE; border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #0AACE8, #5AC8FB); border-radius: 999px; transition: width 0.4s; width: 0%; }
.progress-label { text-align: right; font-size: 0.95rem; font-weight: 700; color: #0AACE8; margin-top: 4px; }

/* PISTA */
.section { width: calc(100% - 32px); max-width: 620px; margin: 16px 16px 0; }
.section-label { font-family: 'Baloo 2', sans-serif; font-size: 1.05rem; font-weight: 800; color: #0AACE8; margin-bottom: 8px; text-align: center; }

.track {
  background: #C8E6F5;
  border-radius: 20px;
  padding: 14px 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  border: 3px dashed #0AACE8;
  min-height: 108px;
}

.slot {
  width: 88px; height: 88px;
  background: white;
  border-radius: 14px;
  border: 2.5px dashed #5AC8FB;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.slot.over { border-color: #F5C518; background: #FFFBEB; }
.slot.correct { border-color: #22C55E; background: #F0FDF4; border-style: solid; }
.slot.wrong { border-color: #EF4444; background: #FEF2F2; animation: shake 0.35s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
.slot-pos { font-family: 'Baloo 2', sans-serif; font-size: 1.15rem; font-weight: 900; color: #0AACE8; }
.slot-nome { font-size: 0.78rem; font-weight: 700; color: #5AC8FB; }
.slot-filled-emoji { font-size: 2rem; line-height: 1; }
.slot-filled-ord { font-family: 'Baloo 2', sans-serif; font-size: 1rem; font-weight: 900; color: #16A34A; margin-top: 2px; }

/* GARAGEM */
.garage {
  background: white;
  border-radius: 20px;
  padding: 14px 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  box-shadow: 0 2px 12px rgba(10,172,232,0.10);
  min-height: 108px;
}

.car-card {
  width: 88px; height: 88px;
  border-radius: 14px;
  border: 3px solid transparent;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: grab;
  user-select: none;
  touch-action: none;
  transition: transform 0.15s, opacity 0.2s;
}
.car-card:active { cursor: grabbing; }
.car-card.dragging { opacity: 0.35; transform: scale(0.92); }
.car-emoji { font-size: 2.2rem; line-height: 1; }
.car-ordinal { font-family: 'Baloo 2', sans-serif; font-size: 1.05rem; font-weight: 900; margin-top: 2px; }

.car-1  { background:#FEE2E2; border-color:#EF4444; }  .car-1  .car-ordinal { color:#DC2626; }
.car-2  { background:#FEF3C7; border-color:#F59E0B; }  .car-2  .car-ordinal { color:#D97706; }
.car-3  { background:#D1FAE5; border-color:#22C55E; }  .car-3  .car-ordinal { color:#16A34A; }
.car-4  { background:#EFF9FF; border-color:#0AACE8; }  .car-4  .car-ordinal { color:#044A7A; }
.car-5  { background:#F5F3FF; border-color:#A855F7; }  .car-5  .car-ordinal { color:#7C3AED; }
.car-6  { background:#FFF7ED; border-color:#F97316; }  .car-6  .car-ordinal { color:#EA580C; }
.car-7  { background:#FCE7F3; border-color:#EC4899; }  .car-7  .car-ordinal { color:#DB2777; }
.car-8  { background:#ECFDF5; border-color:#34D399; }  .car-8  .car-ordinal { color:#059669; }
.car-9  { background:#FEF9C3; border-color:#EAB308; }  .car-9  .car-ordinal { color:#CA8A04; }

/* RESULTADO */
.resultado { display:none; flex-direction:column; align-items:center; margin:20px 16px 0; width:calc(100% - 32px); max-width:620px; }
.resultado.show { display:flex; }
.resultado-msg {
  background: linear-gradient(135deg,#22C55E,#16A34A);
  color:white; font-family:'Baloo 2',sans-serif; font-size:1.5rem; font-weight:900;
  padding:18px 32px; border-radius:20px; text-align:center;
  animation: pop 0.4s ease;
}
@keyframes pop { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }

.btns { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin:20px 16px 32px; }
.btn { font-family:'Baloo 2',sans-serif; font-size:1.1rem; font-weight:800; padding:14px 28px; border:none; border-radius:14px; cursor:pointer; transition:transform 0.1s; }
.btn:active { transform:scale(0.97); }
.btn-primary { background:var(--primary); color:white; box-shadow:0 4px 12px rgba(10,172,232,0.3); }
.btn-back { background:white; color:#044A7A; border:2.5px solid #0AACE8; }

@media (max-width:480px) {
  .header h1 { font-size:1.4rem; }
  .instrucao { font-size:1.1rem; }
  .car-card, .slot { width:74px; height:74px; }
  .car-emoji { font-size:1.9rem; }
  .car-ordinal { font-size:0.9rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🏎️ Corrida Ordenada!</h1>
  <p>Organize os carros do 1º ao 9º lugar! 🏆</p>
</div>

<div class="instrucao">
  Arraste cada carro para o slot certo na pista —<br>do <strong>1º (primeiro)</strong> ao <strong>9º (nono)</strong>!
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">0 de 9 no lugar certo</div>
</div>

<div class="section">
  <div class="section-label">🏁 Pista de chegada — arraste para cá</div>
  <div class="track" id="track"></div>
</div>

<div class="section">
  <div class="section-label">🔧 Garagem — carros embaralhados</div>
  <div class="garage" id="garage"></div>
</div>

<div class="resultado" id="resultado">
  <div class="resultado-msg">🎉 Incrível! Você colocou todos em ordem! 🥇🥈🥉</div>
</div>

<div class="btns">
  <button class="btn btn-primary" onclick="embaralhar()">🔀 Nova corrida</button>
  <button class="btn btn-back" onclick="window.location.href='../../index.html'">⬅️ Voltar ao Portal</button>
</div>

<script>
const CARROS = [
  { pos:1, emoji:'🏎️', ordinal:'1º', nome:'primeiro', classe:'car-1' },
  { pos:2, emoji:'🚗', ordinal:'2º', nome:'segundo',  classe:'car-2' },
  { pos:3, emoji:'🚕', ordinal:'3º', nome:'terceiro', classe:'car-3' },
  { pos:4, emoji:'🚙', ordinal:'4º', nome:'quarto',   classe:'car-4' },
  { pos:5, emoji:'🚌', ordinal:'5º', nome:'quinto',   classe:'car-5' },
  { pos:6, emoji:'🚐', ordinal:'6º', nome:'sexto',    classe:'car-6' },
  { pos:7, emoji:'🛻', ordinal:'7º', nome:'sétimo',  classe:'car-7' },
  { pos:8, emoji:'🚑', ordinal:'8º', nome:'oitavo',  classe:'car-8' },
  { pos:9, emoji:'🚒', ordinal:'9º', nome:'nono',    classe:'car-9' },
];

let acertos = 0;
let draggingCar = null;

function playSound(type) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  if (type === 'correct') {
    o.frequency.setValueAtTime(523, ctx.currentTime);
    o.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
    o.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    o.start(); o.stop(ctx.currentTime + 0.5);
  } else {
    o.frequency.setValueAtTime(300, ctx.currentTime);
    o.frequency.setValueAtTime(200, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    o.start(); o.stop(ctx.currentTime + 0.4);
  }
}

function playVictory() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  [523,659,784,1047].forEach((freq,i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.25, ctx.currentTime + i*0.15);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.15 + 0.4);
    o.start(ctx.currentTime + i*0.15);
    o.stop(ctx.currentTime + i*0.15 + 0.4);
  });
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  // garante que nunca sai na ordem certa
  const emOrdem = a.every((c,i) => c.pos === i+1);
  return emOrdem ? shuffle(arr) : a;
}

function updateProgress() {
  document.getElementById('progressFill').style.width = (acertos/9*100)+'%';
  document.getElementById('progressLabel').textContent = acertos+' de 9 no lugar certo';
}

function buildTrack() {
  const track = document.getElementById('track');
  track.innerHTML = '';
  CARROS.forEach(c => {
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.pos = c.pos;
    slot.innerHTML = `<div class="slot-pos">${c.ordinal}</div><div class="slot-nome">${c.nome}</div>`;

    slot.addEventListener('dragover', e => { e.preventDefault(); if (!slot.dataset.filled) slot.classList.add('over'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('over'));
    slot.addEventListener('drop', e => { e.preventDefault(); slot.classList.remove('over'); drop(slot); });

    track.appendChild(slot);
  });
}

function buildGarage(shuffled) {
  const garage = document.getElementById('garage');
  garage.innerHTML = '';
  shuffled.forEach(c => garage.appendChild(makeCard(c)));
}

function makeCard(c) {
  const card = document.createElement('div');
  card.className = `car-card ${c.classe}`;
  card.draggable = true;
  card.dataset.pos = c.pos;
  card.innerHTML = `<div class="car-emoji">${c.emoji}</div><div class="car-ordinal">${c.ordinal}</div>`;

  card.addEventListener('dragstart', () => { draggingCar = c; card.classList.add('dragging'); });
  card.addEventListener('dragend',   () => card.classList.remove('dragging'));
  card.addEventListener('touchstart',() => { draggingCar = c; }, { passive:true });

  return card;
}

function drop(slot) {
  if (!draggingCar || slot.dataset.filled) return;
  const c = draggingCar;
  const slotPos = parseInt(slot.dataset.pos);

  if (c.pos === slotPos) {
    // Acerto
    slot.innerHTML = `<div class="slot-filled-emoji">${c.emoji}</div><div class="slot-filled-ord">${c.ordinal}</div>`;
    slot.classList.add('correct');
    slot.dataset.filled = '1';
    document.querySelectorAll(`.car-card[data-pos="${c.pos}"]`).forEach(el => el.remove());
    acertos++;
    playSound('correct');
    updateProgress();
    if (acertos === 9) setTimeout(() => { window.sabendoScore = 100; document.getElementById('resultado').classList.add('show'); playVictory(); }, 350);
  } else {
    // Erro
    slot.classList.add('wrong');
    setTimeout(() => slot.classList.remove('wrong'), 600);
    playSound('wrong');
  }
  draggingCar = null;
}

// Touch drag: impede scroll e destaca slot sob o dedo
document.addEventListener('touchmove', function(e) {
  if (!draggingCar) return;
  e.preventDefault();
  var touch = e.touches[0];
  var el = document.elementFromPoint(touch.clientX, touch.clientY);
  document.querySelectorAll('.slot').forEach(function(s) { s.classList.remove('over'); });
  while (el && !el.classList.contains('slot')) el = el.parentElement;
  if (el && !el.dataset.filled) el.classList.add('over');
}, { passive: false });

// Touch drag: drop no slot sob o dedo ao soltar
document.addEventListener('touchend', function(e) {
  if (!draggingCar) return;
  var touch = e.changedTouches[0];
  var el = document.elementFromPoint(touch.clientX, touch.clientY);
  document.querySelectorAll('.slot').forEach(function(s) { s.classList.remove('over'); });
  while (el && !el.classList.contains('slot')) el = el.parentElement;
  if (el) drop(el);
  else draggingCar = null;
}, { passive: true });

function embaralhar() {
  acertos = 0;
  draggingCar = null;
  document.getElementById('resultado').classList.remove('show');
  updateProgress();
  buildTrack();
  buildGarage(shuffle(CARROS));
}

embaralhar();
</script>
