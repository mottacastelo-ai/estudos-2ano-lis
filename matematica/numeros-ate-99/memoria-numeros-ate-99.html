<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Memória — Números até 99 | Portal da Lis</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root { --primary: #0AACE8; --light: #5AC8FB; --bg: #EFF9FF; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; }

.header {
  background: linear-gradient(135deg, #044A7A, #0AACE8 60%, #5AC8FB);
  color: #fff; padding: 20px 24px; text-align: center;
}
.header .emoji { font-size: 2.5rem; }
.header h1 { font-family: 'Baloo 2', sans-serif; font-size: 1.6rem; font-weight: 900; margin-top: 4px; }
.header p { font-size: 1rem; opacity: 0.9; }

.container { max-width: 740px; margin: 0 auto; padding: 20px 16px; }

.info-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; font-weight: 700; font-size: 1.1rem; color: var(--primary);
}

.instrucao {
  background: #fff; border-radius: 14px; padding: 14px 18px;
  font-size: 1.1rem; color: #1a3a50; margin-bottom: 18px;
  box-shadow: 0 2px 10px rgba(10,172,232,0.1);
  font-weight: 600;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.card-mem {
  aspect-ratio: 3/4;
  min-height: 80px;
  cursor: pointer;
  perspective: 600px;
  position: relative;
}
.card-inner {
  width: 100%; height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.4s;
  border-radius: 14px;
}
.card-mem.virada .card-inner { transform: rotateY(180deg); }

.card-frente, .card-verso {
  position: absolute; width: 100%; height: 100%;
  border-radius: 14px;
  backface-visibility: hidden;
  display: flex; align-items: center; justify-content: center;
  padding: 8px;
  font-weight: 800;
  text-align: center;
}
.card-frente {
  background: linear-gradient(135deg, #0AACE8, #5AC8FB);
  color: #fff;
  font-size: 2rem;
}
.card-verso {
  background: #fff;
  border: 3px solid var(--light);
  color: #1a3a50;
  transform: rotateY(180deg);
  font-size: 1.1rem;
  line-height: 1.3;
}
.card-verso.tipo-numero { font-size: 2rem; color: var(--primary); }
.card-mem.acertada .card-verso {
  background: #d1fae5; border-color: #22c55e; color: #166534;
}
.card-mem.acertada .card-frente { background: #22c55e; }

.resultado-box {
  display: none; text-align: center;
  background: #fff; border-radius: 20px; padding: 32px 24px;
  box-shadow: 0 4px 20px rgba(10,172,232,0.14);
}
.resultado-box .emoji-final { font-size: 4rem; }
.resultado-box h2 { font-family: 'Baloo 2', sans-serif; font-size: 2rem; color: var(--primary); margin: 12px 0 8px; }
.resultado-box p { font-size: 1.2rem; color: #1a3a50; }

.btn-jogar-de-novo {
  background: linear-gradient(135deg, #0AACE8, #5AC8FB);
  color: #fff; border: none; border-radius: 50px;
  padding: 14px 36px; font-family: 'Baloo 2', sans-serif;
  font-size: 1.2rem; font-weight: 800; cursor: pointer;
  box-shadow: 0 4px 16px rgba(10,172,232,0.3); margin-top: 16px;
}
.btn-voltar {
  background: transparent; border: 2px solid var(--primary); color: var(--primary);
  border-radius: 50px; padding: 12px 28px;
  font-family: 'Baloo 2', sans-serif; font-size: 1.1rem; font-weight: 800;
  cursor: pointer; margin-top: 10px;
}

@media (max-width: 480px) {
  .grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .card-verso { font-size: 0.85rem; }
  .card-verso.tipo-numero { font-size: 1.4rem; }
  .header h1 { font-size: 1.3rem; }
}
</style>
</head>
<body>

<div class="header">
  <div class="emoji">🧮</div>
  <h1>Jogo da Memória</h1>
  <p>Pareie o número com o nome por extenso!</p>
</div>

<div class="container">
  <div class="info-bar">
    <span>Pares encontrados: <span id="pares">0</span>/8</span>
    <span>Tentativas: <span id="tentativas">0</span></span>
  </div>

  <div class="instrucao">
    🎯 Clique em duas cartas para virá-las. Se o número combinar com a escrita por extenso, você acertou!
  </div>

  <div class="grid" id="grid"></div>

  <div class="resultado-box" id="resultado">
    <div class="emoji-final">🎉</div>
    <h2>Parabéns!</h2>
    <p>Você encontrou todos os pares em <span id="res-tentativas">0</span> tentativas!</p>
    <br>
    <button class="btn-jogar-de-novo" onclick="iniciarJogo()">Jogar de Novo 🔄</button>
    <br>
    <button class="btn-voltar" onclick="voltarAoPortal()">⬅ Voltar ao Portal</button>
  </div>
</div>

<script>
(function () {

var pares = [
  { numero: '31', extenso: 'trinta e um' },
  { numero: '45', extenso: 'quarenta e cinco' },
  { numero: '68', extenso: 'sessenta e oito' },
  { numero: '82', extenso: 'oitenta e dois' },
  { numero: '27', extenso: 'vinte e sete' },
  { numero: '73', extenso: 'setenta e três' },
  { numero: '90', extenso: 'noventa' },
  { numero: '54', extenso: 'cinquenta e quatro' }
];

var paresEncontrados = 0;
var numTentativas = 0;
var viradas = [];
var bloqueado = false;

function playSound(tipo) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var o = ctx.createOscillator(); var g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if (tipo === 'correct') {
      o.frequency.setValueAtTime(523, ctx.currentTime);
      o.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
      o.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o.start(); o.stop(ctx.currentTime + 0.5);
    } else {
      o.frequency.setValueAtTime(300, ctx.currentTime);
      o.frequency.setValueAtTime(200, ctx.currentTime + 0.15);
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
      o.start(); o.stop(ctx.currentTime + 0.4);
    }
  } catch(e) {}
}

function embaralhar(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function iniciarJogo() {
  paresEncontrados = 0;
  numTentativas = 0;
  viradas = [];
  bloqueado = false;
  document.getElementById('pares').textContent = '0';
  document.getElementById('tentativas').textContent = '0';
  document.getElementById('resultado').style.display = 'none';

  // Criar 16 cartas (8 pares)
  var cartas = [];
  pares.forEach(function(p, i) {
    cartas.push({ id: i, tipo: 'numero', valor: p.numero, par: i });
    cartas.push({ id: i + 8, tipo: 'extenso', valor: p.extenso, par: i });
  });
  cartas = embaralhar(cartas);

  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  cartas.forEach(function(c, idx) {
    var div = document.createElement('div');
    div.className = 'card-mem';
    div.setAttribute('data-par', c.par);
    div.setAttribute('data-tipo', c.tipo);
    div.innerHTML = '<div class="card-inner">' +
      '<div class="card-frente">🧮</div>' +
      '<div class="card-verso' + (c.tipo === 'numero' ? ' tipo-numero' : '') + '">' + c.valor + '</div>' +
      '</div>';
    div.addEventListener('click', function() { clicarCarta(div); });
    grid.appendChild(div);
  });
}

function clicarCarta(el) {
  if (bloqueado) return;
  if (el.classList.contains('virada') || el.classList.contains('acertada')) return;
  el.classList.add('virada');
  viradas.push(el);

  if (viradas.length === 2) {
    numTentativas++;
    document.getElementById('tentativas').textContent = numTentativas;
    bloqueado = true;
    var a = viradas[0], b = viradas[1];
    var mesmoTipo = a.getAttribute('data-tipo') === b.getAttribute('data-tipo');
    var mesmoPar = a.getAttribute('data-par') === b.getAttribute('data-par');

    if (mesmoPar && !mesmoTipo) {
      // Acerto
      playSound('correct');
      setTimeout(function() {
        a.classList.add('acertada');
        b.classList.add('acertada');
        viradas = [];
        bloqueado = false;
        paresEncontrados++;
        document.getElementById('pares').textContent = paresEncontrados;
        if (paresEncontrados === 8) mostrarResultado();
      }, 600);
    } else {
      playSound('wrong');
      setTimeout(function() {
        a.classList.remove('virada');
        b.classList.remove('virada');
        viradas = [];
        bloqueado = false;
      }, 900);
    }
  }
}

function mostrarResultado() {
  window.sabendoScore = 100;
  document.getElementById('res-tentativas').textContent = numTentativas;
  document.getElementById('resultado').style.display = 'block';
}

window.iniciarJogo = iniciarJogo;

iniciarJogo();

})();
</script>

    background:linear-gradient(135deg,#0AACE8,#5AC8FB);
    color:#fff;border:none;border-radius:50px;
    font-family:'Baloo 2',sans-serif;font-size:1.2rem;font-weight:800;
    cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.2);
    width:fit-content;">
  Coletar minha carta! 🃏
</button>
<script src="../../shared/portal-back.js"></script>
</body>
</html>
