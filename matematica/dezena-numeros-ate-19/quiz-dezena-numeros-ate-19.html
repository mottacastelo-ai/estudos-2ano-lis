<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — A Dezena e os Números até 19 | Portal da Lis</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root { --primary: #0AACE8; --light: #5AC8FB; --bg: #EFF9FF; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; font-size: 1.1rem; background: var(--bg); min-height: 100vh; }
.header { background: linear-gradient(135deg, #044A7A, #0AACE8 60%, #5AC8FB); color: #fff; padding: 20px 24px; text-align: center; }
.header h1 { font-family: 'Baloo 2', sans-serif; font-size: 1.6rem; font-weight: 900; }
.header p { font-size: 1rem; opacity: 0.9; margin-top: 4px; }
.container { max-width: 680px; margin: 0 auto; padding: 24px 16px; }
.placar { display: flex; justify-content: center; gap: 24px; margin-bottom: 20px; }
.placar-item { background: #fff; border-radius: 12px; padding: 10px 20px; text-align: center; box-shadow: 0 2px 8px rgba(10,172,232,.15); }
.placar-item span { display: block; font-size: 1.6rem; font-weight: 900; color: var(--primary); }
.placar-item label { font-size: 0.85rem; color: #666; }
.card { background: #fff; border-radius: 20px; padding: 28px 24px; box-shadow: 0 4px 20px rgba(10,172,232,.12); margin-bottom: 20px; }
.numero-questao { font-size: 0.9rem; color: var(--primary); font-weight: 700; margin-bottom: 10px; }
.enunciado { font-size: 1.5rem; font-weight: 800; color: #1a2a3a; line-height: 1.4; margin-bottom: 24px; }
.opcoes { display: flex; flex-direction: column; gap: 12px; }
.opcao-btn { background: #F0F8FF; border: 2.5px solid #C8E8F8; border-radius: 14px; padding: 14px 20px; font-family: 'Nunito', sans-serif; font-size: 1.2rem; font-weight: 700; color: #1a2a3a; cursor: pointer; text-align: left; transition: all .2s; min-height: 52px; }
.opcao-btn:hover { background: #DCF0FA; border-color: var(--primary); transform: translateX(4px); }
.opcao-btn.correta { background: #D1FAE5; border-color: #10B981; color: #065F46; }
.opcao-btn.errada { background: #FEE2E2; border-color: #EF4444; color: #7F1D1D; }
.feedback { margin-top: 16px; padding: 12px 16px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; display: none; }
.feedback.show { display: block; }
.feedback.ok { background: #D1FAE5; color: #065F46; }
.feedback.nao { background: #FEE2E2; color: #7F1D1D; }
.btn-prox { display: none; margin-top: 16px; width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 14px; font-family: 'Baloo 2', sans-serif; font-size: 1.2rem; font-weight: 800; cursor: pointer; }
.btn-prox.show { display: block; }
.resultado { background: #fff; border-radius: 20px; padding: 36px 24px; text-align: center; box-shadow: 0 4px 20px rgba(10,172,232,.12); display: none; }
.resultado.show { display: block; }
.resultado h2 { font-family: 'Baloo 2', sans-serif; font-size: 2rem; font-weight: 900; color: var(--primary); }
.resultado .nota { font-size: 3rem; font-weight: 900; color: #1a2a3a; margin: 12px 0; }
.resultado p { font-size: 1.2rem; color: #444; margin-bottom: 20px; }
.btn-reiniciar { padding: 14px 32px; background: linear-gradient(135deg, var(--primary), var(--light)); color: #fff; border: none; border-radius: 50px; font-family: 'Baloo 2', sans-serif; font-size: 1.1rem; font-weight: 800; cursor: pointer; }
.voltar { display: block; text-align: center; margin-top: 20px; color: var(--primary); font-weight: 700; cursor: pointer; font-size: 1rem; }
@media (max-width: 480px) {
  body { padding: 0; font-size: 1.15rem; }
  .enunciado { font-size: 1.3rem; }
  .opcao-btn { width: 100%; }
  .header h1 { font-size: 1.3rem; }
}
</style>
</head>
<body>
<div class="header">
  <div style="font-size:2.5rem;margin-bottom:6px;">🟨</div>
  <h1>Quiz — A Dezena e os Números até 19</h1>
  <p>Dezi te desafia! Responda 8 perguntas 🎯</p>
</div>
<div class="container">
  <div class="placar">
    <div class="placar-item"><span id="acertos">0</span><label>Acertos</label></div>
    <div class="placar-item"><span id="qtd-questao">1/8</span><label>Questão</label></div>
  </div>
  <div id="area-quiz">
    <div class="card" id="card-questao">
      <div class="numero-questao" id="num-q">Questão 1 de 8</div>
      <div class="enunciado" id="enunciado"></div>
      <div class="opcoes" id="opcoes"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-prox" id="btn-prox" onclick="proximaPergunta()">Próxima →</button>
    </div>
  </div>
  <div class="resultado" id="resultado">
    <div style="font-size:3rem;">🟨</div>
    <h2>Resultado Final!</h2>
    <div class="nota" id="nota-final"></div>
    <p id="msg-final"></p>
    <button class="btn-reiniciar" onclick="reiniciarQuiz()">Jogar de Novo 🔄</button>
  </div>
  <div style="text-align:center;margin-top:12px;">
    <span class="voltar" onclick="voltarAoPortal()">← Voltar ao Portal</span>
  </div>
</div>

<script>
(function () {
  var perguntas = [
    {
      enunciado: 'O que é uma dezena?',
      opcoes: ['Um grupo com 5 unidades', 'Um grupo com 10 unidades', 'Um grupo com 20 unidades'],
      correta: 1,
      feedback: 'Isso! Uma dezena = 10 unidades! 🎉'
    },
    {
      enunciado: 'No quadro de ordens, a letra D significa:',
      opcoes: ['Dez', 'Dezenas', 'Dois'],
      correta: 1,
      feedback: 'Correto! D = coluna das Dezenas! 🏆'
    },
    {
      enunciado: 'No material dourado, a BARRINHA representa:',
      opcoes: ['1 unidade', '1 dezena', '10 dezenas'],
      correta: 1,
      feedback: 'Isso! A barrinha = 1 dezena (10 cubinhos)! 🟨'
    },
    {
      enunciado: 'No material dourado, o CUBINHO representa:',
      opcoes: ['1 dezena', '1 centena', '1 unidade'],
      correta: 2,
      feedback: 'Muito bem! O cubinho = 1 unidade! ✅'
    },
    {
      enunciado: 'No ábaco, as argolas na casa D representam:',
      opcoes: ['Unidades', 'Dezenas', 'Centenas'],
      correta: 1,
      feedback: 'Perfeito! Casa D = dezenas no ábaco! 🎯'
    },
    {
      enunciado: 'Como se escreve o número 15 por extenso?',
      opcoes: ['Treze', 'Doze', 'Quinze'],
      correta: 2,
      feedback: 'Isso mesmo! 15 = quinze! 🌟'
    },
    {
      enunciado: 'Qual destes números vem em ordem crescente?',
      opcoes: ['19, 15, 11', '11, 15, 19', '15, 11, 19'],
      correta: 1,
      feedback: 'Correto! Crescente: do menor para o maior! 📈'
    },
    {
      enunciado: 'Como se escreve o número 12 por extenso?',
      opcoes: ['Onze', 'Treze', 'Doze'],
      correta: 2,
      feedback: 'Parabéns! 12 = doze! 🎊'
    }
  ];

  var questaoAtual = 0;
  var acertosTotal = 0;
  var ordemOpcoes = [];
  var respondida = false;

  function embaralhar(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function playSound(tipo) {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      if (tipo === 'correct') {
        o.frequency.setValueAtTime(523, ctx.currentTime);
        o.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        o.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
        g.gain.setValueAtTime(0.3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        o.start(); o.stop(ctx.currentTime + 0.5);
      } else {
        o.frequency.setValueAtTime(300, ctx.currentTime);
        o.frequency.setValueAtTime(200, ctx.currentTime + 0.15);
        g.gain.setValueAtTime(0.3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        o.start(); o.stop(ctx.currentTime + 0.4);
      }
    } catch (e) {}
  }

  function renderQuestao() {
    respondida = false;
    var q = perguntas[questaoAtual];
    document.getElementById('num-q').textContent = 'Questão ' + (questaoAtual + 1) + ' de 8';
    document.getElementById('qtd-questao').textContent = (questaoAtual + 1) + '/8';
    document.getElementById('enunciado').textContent = q.enunciado;
    var indices = embaralhar([0, 1, 2]);
    ordemOpcoes = indices;
    var cont = document.getElementById('opcoes');
    cont.innerHTML = '';
    indices.forEach(function (idx, pos) {
      var btn = document.createElement('button');
      btn.className = 'opcao-btn';
      btn.textContent = q.opcoes[idx];
      btn.setAttribute('data-idx', idx);
      btn.onclick = function () { selecionar(idx, btn); };
      cont.appendChild(btn);
    });
    var fb = document.getElementById('feedback');
    fb.className = 'feedback';
    fb.textContent = '';
    var btnP = document.getElementById('btn-prox');
    btnP.className = 'btn-prox';
  }

  function selecionar(idx, btn) {
    if (respondida) return;
    respondida = true;
    var q = perguntas[questaoAtual];
    var botoes = document.querySelectorAll('.opcao-btn');
    botoes.forEach(function (b) { b.onclick = null; });
    var acertou = idx === q.correta;
    btn.className = 'opcao-btn ' + (acertou ? 'correta' : 'errada');
    if (!acertou) {
      botoes.forEach(function (b) {
        if (parseInt(b.getAttribute('data-idx')) === q.correta) b.className = 'opcao-btn correta';
      });
    }
    var fb = document.getElementById('feedback');
    fb.className = 'feedback show ' + (acertou ? 'ok' : 'nao');
    fb.textContent = acertou ? q.feedback : 'Quase! ' + q.feedback;
    if (acertou) {
      acertosTotal++;
      document.getElementById('acertos').textContent = acertosTotal;
      playSound('correct');
    } else {
      playSound('wrong');
    }
    document.getElementById('btn-prox').className = 'btn-prox show';
  }

  function proximaPergunta() {
    questaoAtual++;
    if (questaoAtual >= perguntas.length) {
      mostrarResultado();
    } else {
      renderQuestao();
    }
  }

  function mostrarResultado() {
    document.getElementById('area-quiz').style.display = 'none';
    var res = document.getElementById('resultado');
    res.className = 'resultado show';
    var pct = Math.round((acertosTotal / perguntas.length) * 100);
    window.sabendoScore = pct;
    document.getElementById('nota-final').textContent = acertosTotal + '/8';
    var msgs = [
      [8, 'Incrível! Você mandou muito bem! 🏆🎉'],
      [6, 'Muito bom! Dezi está orgulhosa! 🟨✨'],
      [4, 'Bom trabalho! Pratique mais um pouco! 💪'],
      [0, 'Continue tentando! Você consegue! 🌟']
    ];
    var msg = msgs.find(function (m) { return acertosTotal >= m[0]; });
    document.getElementById('msg-final').textContent = msg ? msg[1] : msgs[3][1];
    playSound('correct');
  }

  function reiniciarQuiz() {
    questaoAtual = 0;
    acertosTotal = 0;
    document.getElementById('acertos').textContent = 0;
    document.getElementById('area-quiz').style.display = 'block';
    document.getElementById('resultado').className = 'resultado';
    renderQuestao();
  }

  window.proximaPergunta = proximaPergunta;
  window.reiniciarQuiz = reiniciarQuiz;

  renderQuestao();
})();
</script>

</body>
