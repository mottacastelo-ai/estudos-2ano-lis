<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Memória — A Dezena e os Números até 19 | Portal da Lis</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root { --primary: #0AACE8; --light: #5AC8FB; --bg: #EFF9FF; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; }
.header { background: linear-gradient(135deg, #044A7A, #0AACE8 60%, #5AC8FB); color: #fff; padding: 20px 24px; text-align: center; }
.header h1 { font-family: 'Baloo 2', sans-serif; font-size: 1.6rem; font-weight: 900; }
.header p { font-size: 1rem; opacity: 0.9; margin-top: 4px; }
.container { max-width: 720px; margin: 0 auto; padding: 20px 16px; }
.info-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 18px; }
.info-item { background: #fff; border-radius: 12px; padding: 10px 18px; text-align: center; box-shadow: 0 2px 8px rgba(10,172,232,.15); }
.info-item span { display: block; font-size: 1.5rem; font-weight: 900; color: var(--primary); }
.info-item label { font-size: 0.85rem; color: #666; }
.instrucao { background: #fff; border-radius: 14px; padding: 14px 18px; margin-bottom: 18px; font-size: 1.2rem; font-weight: 700; color: #1a2a3a; text-align: center; box-shadow: 0 2px 8px rgba(10,172,232,.1); }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.carta { height: 80px; perspective: 600px; cursor: pointer; }
.carta-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .45s; border-radius: 12px; }
.carta.virada .carta-inner { transform: rotateY(180deg); }
.carta.acertada .carta-inner { transform: rotateY(180deg); }
.carta-frente, .carta-verso { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; }
.carta-frente { background: linear-gradient(135deg, #0AACE8, #5AC8FB); color: #fff; font-size: 1.6rem; border: 3px solid #5AC8FB; }
.carta-verso { background: #fff; border: 3px solid #C8E8F8; transform: rotateY(180deg); font-size: 1.1rem; color: #1a2a3a; text-align: center; padding: 6px; line-height: 1.2; }
.carta.acertada .carta-frente { background: linear-gradient(135deg, #10B981, #6EE7B7); border-color: #10B981; }
.carta.acertada .carta-verso { border-color: #10B981; background: #D1FAE5; }
.resultado { background: #fff; border-radius: 20px; padding: 36px 24px; text-align: center; box-shadow: 0 4px 20px rgba(10,172,232,.12); display: none; margin-top: 20px; }
.resultado.show { display: block; }
.resultado h2 { font-family: 'Baloo 2', sans-serif; font-size: 2rem; color: var(--primary); }
.resultado p { font-size: 1.2rem; color: #444; margin: 12px 0 20px; }
.btn-reiniciar { padding: 14px 32px; background: linear-gradient(135deg, var(--primary), var(--light)); color: #fff; border: none; border-radius: 50px; font-family: 'Baloo 2', sans-serif; font-size: 1.1rem; font-weight: 800; cursor: pointer; }
.voltar { display: block; text-align: center; margin-top: 20px; color: var(--primary); font-weight: 700; cursor: pointer; font-size: 1rem; }
@media (max-width: 480px) {
  .grid { grid-template-columns: repeat(4, 1fr); gap: 7px; }
  .carta { height: 70px; }
  .carta-verso { font-size: 0.85rem; }
  .header h1 { font-size: 1.3rem; }
}
</style>
</head>
<body>
<div class="header">
  <div style="font-size:2.5rem;margin-bottom:6px;">🟨</div>
  <h1>Jogo da Memória — Números até 19</h1>
  <p>Encontre o número e o seu nome! 🃏</p>
</div>
<div class="container">
  <div class="info-bar">
    <div class="info-item"><span id="pares">0/8</span><label>Pares</label></div>
    <div class="info-item"><span id="tentativas">0</span><label>Tentativas</label></div>
  </div>
  <div class="instrucao">Parear o número com o nome por extenso</div>
  <div class="grid" id="grid"></div>
  <div class="resultado" id="resultado">
    <div style="font-size:3rem;">🟨</div>
    <h2>Parabéns!</h2>
    <p id="msg-res"></p>
    <button class="btn-reiniciar" onclick="iniciarJogo()">Jogar de Novo 🔄</button>
  </div>
  <span class="voltar" onclick="voltarAoPortal()">← Voltar ao Portal</span>
</div>

<script>
(function () {
  var pares = [
    { num: '10', ext: 'dez' },
    { num: '11', ext: 'onze' },
    { num: '12', ext: 'doze' },
    { num: '13', ext: 'treze' },
    { num: '14', ext: 'catorze' },
    { num: '15', ext: 'quinze' },
    { num: '17', ext: 'dezessete' },
    { num: '19', ext: 'dezenove' }
  ];

  var cartas = [];
  var viradas = [];
  var acertadas = 0;
  var tentativas = 0;
  var bloqueado = false;

  function embaralhar(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function playSound(tipo) {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      if (tipo === 'correct') {
        o.frequency.setValueAtTime(523, ctx.currentTime);
        o.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        o.frequency.setValueAtTime(784, ctx.currentTime + 0.2);
        g.gain.setValueAtTime(0.3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        o.start(); o.stop(ctx.currentTime + 0.5);
      } else {
        o.frequency.setValueAtTime(300, ctx.currentTime);
        o.frequency.setValueAtTime(200, ctx.currentTime + 0.15);
        g.gain.setValueAtTime(0.3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        o.start(); o.stop(ctx.currentTime + 0.4);
      }
    } catch (e) {}
  }

  function iniciarJogo() {
    acertadas = 0; tentativas = 0; viradas = []; bloqueado = false;
    document.getElementById('pares').textContent = '0/8';
    document.getElementById('tentativas').textContent = '0';
    document.getElementById('resultado').className = 'resultado';
    var itens = [];
    pares.forEach(function (p, i) {
      itens.push({ id: i, tipo: 'num', valor: p.num, par: i });
      itens.push({ id: i + pares.length, tipo: 'ext', valor: p.ext, par: i });
    });
    cartas = embaralhar(itens);
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    cartas.forEach(function (c, pos) {
      var div = document.createElement('div');
      div.className = 'carta';
      div.setAttribute('data-pos', pos);
      div.innerHTML = '<div class="carta-inner"><div class="carta-frente">🟨</div><div class="carta-verso">' + c.valor + '</div></div>';
      div.addEventListener('click', function () { clicarCarta(pos); });
      grid.appendChild(div);
    });
  }

  function clicarCarta(pos) {
    if (bloqueado) return;
    var els = document.querySelectorAll('.carta');
    var el = els[pos];
    if (!el || el.classList.contains('virada') || el.classList.contains('acertada')) return;
    el.classList.add('virada');
    viradas.push(pos);
    if (viradas.length === 2) {
      bloqueado = true;
      tentativas++;
      document.getElementById('tentativas').textContent = tentativas;
      var p1 = cartas[viradas[0]];
      var p2 = cartas[viradas[1]];
      if (p1.par === p2.par && p1.tipo !== p2.tipo) {
        playSound('correct');
        acertadas++;
        document.getElementById('pares').textContent = acertadas + '/8';
        els[viradas[0]].classList.add('acertada');
        els[viradas[1]].classList.add('acertada');
        viradas = [];
        bloqueado = false;
        if (acertadas === 8) {
          setTimeout(function () { mostrarResultado(); }, 600);
        }
      } else {
        playSound('wrong');
        setTimeout(function () {
          els[viradas[0]].classList.remove('virada');
          els[viradas[1]].classList.remove('virada');
          viradas = [];
          bloqueado = false;
        }, 900);
      }
    }
  }

  function mostrarResultado() {
    window.sabendoScore = 100;
    var res = document.getElementById('resultado');
    res.className = 'resultado show';
    document.getElementById('msg-res').textContent = 'Você encontrou todos os 8 pares em ' + tentativas + ' tentativas! Dezi está super feliz! 🟨🎉';
    playSound('correct');
  }

  window.iniciarJogo = iniciarJogo;
  iniciarJogo();
})();
</script>
